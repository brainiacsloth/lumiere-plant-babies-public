<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumiere Plant Babies</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,700;0,900;1,300;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Geist+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#ede8de; --s1:#faf7f2; --s2:#f4f0e8;
  --ink:#111110; --mid:#555550; --muted:#99998e; --faint:#e0ddd6;
  --forest:#0a2e22; --moss:#1a5e3e; --sage:#2e9e72; --mint:#7dd8b0; --mist:#edf7f2;
  --amber:#c07808; --amber-bg:#fef5e0;
  --red:#b83030; --red-bg:#fce8e8;
  --lav:#eeebff; --lav-ink:#4433a8;
  --sw:240px; --bdr:rgba(0,0,0,0.07);
  --sh:0 1px 3px rgba(0,0,0,0.05),0 4px 16px rgba(0,0,0,0.07);
  --sh2:0 8px 32px rgba(0,0,0,0.12);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
html,body{height:100%}
body{font-family:"Montserrat",sans-serif;background:transparent;color:var(--ink);display:flex;min-height:100vh;overflow-x:hidden;position:relative}

/* ─── ANIMATED LEAF CANVAS ─── */
#leaf-canvas{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;background:var(--bg);}
.leaf{position:absolute;opacity:0;animation:leafFloat linear infinite;}
@keyframes leafFloat{
  0%{transform:translateY(0) rotate(0deg) scale(1);opacity:0;}
  5%{opacity:var(--leaf-opacity);}
  90%{opacity:var(--leaf-opacity);}
  100%{transform:translateY(-110vh) rotate(var(--leaf-rot)) scale(var(--leaf-scale));opacity:0;}
}

/* USER SELECT SCREEN */

.uc-av-emoji{font-size:44px;margin-bottom:2px;line-height:1;display:block}
.up-av-e{font-size:20px;line-height:1;flex-shrink:0;width:28px;text-align:center}



/* SIDEBAR */
.sidebar{width:var(--sw);min-height:100vh;background:#0c0c0a;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:200;transition:transform .3s cubic-bezier(.4,0,.2,1)}
.sidebar.collapsed{transform:translateX(calc(-1 * var(--sw)))}
.brand{padding:26px 20px 20px;border-bottom:1px solid rgba(255,255,255,0.06)}
.brand-logo{width:32px;height:32px;border-radius:8px;object-fit:contain;background:#fff;padding:2px;display:block;margin-bottom:11px}
.brand-name{font-size:10px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.8)}
.brand-name span{color:var(--mint)}
.brand-sub{font-family:"Geist Mono",monospace;font-size:8px;letter-spacing:1.5px;color:rgba(255,255,255,0.18);margin-top:3px}
.nav-wrap{padding:14px 0;flex:1;overflow-y:auto}
.nav-lbl{font-family:"Geist Mono",monospace;font-size:7px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.18);padding:10px 20px 5px}
.nav-btn{display:flex;align-items:center;gap:10px;padding:9px 20px;background:none;border:none;cursor:pointer;width:100%;text-align:left;color:rgba(255,255,255,0.35);font-family:"Montserrat",sans-serif;font-size:12px;font-weight:500;position:relative;transition:color .15s,background .15s}
.nav-btn:hover{color:rgba(255,255,255,0.7);background:rgba(255,255,255,0.04)}
.nav-btn.active{color:#fff;background:rgba(255,255,255,0.07)}
.nav-btn.active::before{content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);width:2px;height:44%;background:var(--sage);border-radius:0 2px 2px 0}
.nav-ico{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;font-family:"Geist Mono",monospace;font-size:9px;background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.35);padding:2px 7px;border-radius:99px}
.nav-btn.active .nav-badge{background:rgba(46,158,114,0.18);color:var(--mint)}
.nav-div{height:1px;background:rgba(255,255,255,0.05);margin:8px 0}
.sb-foot{padding:14px 20px 20px;border-top:1px solid rgba(255,255,255,0.05)}
.user-pill{display:flex;align-items:center;gap:9px;margin-bottom:10px;cursor:pointer;padding:8px 10px;border-radius:8px;transition:background .15s}
.user-pill:hover{background:rgba(255,255,255,0.05)}
.up-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#fff;flex-shrink:0}
.up-name{font-size:12px;font-weight:600;color:rgba(255,255,255,0.8)}
.up-switch{font-family:"Geist Mono",monospace;font-size:8px;color:rgba(255,255,255,0.25);letter-spacing:.6px;margin-top:1px}
.pun-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:11px 13px}
.pun-ico{font-size:15px;margin-bottom:4px;display:block}
.pun-top{font-family:"Geist Mono",monospace;font-size:9px;color:rgba(255,255,255,0.25);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.pun-txt{font-family:"Cormorant Garamond",serif;font-size:12px;color:rgba(255,255,255,0.5);line-height:1.5;font-style:italic}
.pun-txt em{color:var(--mint);font-style:normal;font-weight:normal}

/* SIDEBAR TOGGLE */
.sb-toggle{position:fixed;top:14px;z-index:300;background:#0c0c0a;border:1px solid rgba(255,255,255,0.1);border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:rgba(255,255,255,0.55);font-size:14px;transition:left .3s cubic-bezier(.4,0,.2,1),background .15s}
.sb-toggle:hover{background:#1c1c1a;color:#fff}
.sb-toggle.open{left:calc(var(--sw) + 14px)}
.sb-toggle.closed{left:14px}

/* MAIN */
.main{margin-left:var(--sw);flex:1;display:flex;flex-direction:column;min-height:100vh;transition:margin-left .3s cubic-bezier(.4,0,.2,1);position:relative;z-index:auto;background:transparent}
.main.full{margin-left:0}
.topbar{height:56px;min-height:56px;flex-shrink:0;background:rgba(244,240,232,0.96);border-bottom:1.5px solid rgba(0,0,0,0.08);display:flex;align-items:center;justify-content:space-between;padding:0 32px 0 80px;position:sticky;top:0;z-index:100;}
.main.full .topbar{padding-left:60px}
.topbar-title{font-size:11px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;color:var(--forest)}
.topbar-right{display:flex;align-items:center;gap:10px}
.btn-add{display:flex;align-items:center;gap:8px;padding:0;background:none;border:none;cursor:pointer}
.btn-add-sq{width:30px;height:30px;border-radius:8px;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:300;transition:background .22s,transform .22s,border-radius .28s;flex-shrink:0}
.btn-add-lbl{font-size:12px;font-weight:600;color:var(--ink);letter-spacing:.3px;transition:opacity .2s}
.btn-add:hover .btn-add-sq{background:var(--forest);border-radius:99px;transform:rotate(90deg)}
.btn-add:hover .btn-add-lbl{opacity:0.38}
.btn-add:active .btn-add-sq{transform:rotate(90deg) scale(0.88)}
.page{padding:44px 36px 40px;flex:1;background:transparent}

/* WELCOME */
.wlc-greeting .acc{color:var(--sage)}
.wlc-pun-line em{font-style:normal;font-weight:900;color:var(--forest)}
.alert-pill{display:flex;align-items:center;gap:10px;padding:11px 16px;border-radius:10px;font-size:12px;font-weight:500;animation:fadeUp .4s ease both}
.ap-w{background:var(--mist);color:var(--forest);border:1px solid rgba(46,158,114,0.18)}
.ap-f{background:var(--amber-bg);color:#7a4200;border:1px solid rgba(192,120,8,0.18)}
.ap-d{background:var(--red-bg);color:var(--red);border:1px solid rgba(184,48,48,0.18)}
.ap-ok{background:var(--mist);color:var(--forest);border:1px solid rgba(46,158,114,0.18)}
.cta-btn{padding:11px 24px;border-radius:8px;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;border:none;transition:transform .15s,opacity .15s,background .15s}
.cta-btn:active{transform:scale(0.97)}
.cta-p{background:var(--forest);color:#fff}
.cta-p:hover{background:var(--moss)}
.cta-g{background:none;border:1.5px solid var(--faint);color:var(--mid)}
.cta-g:hover{border-color:var(--mid)}

/* CATEGORY TABS */
.cat-tabs{display:flex;gap:5px;margin-bottom:20px;flex-wrap:wrap}
.cat-tab{padding:6px 13px;border-radius:99px;border:1.5px solid var(--faint);background:none;font-family:"Montserrat",sans-serif;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px}
.cat-tab:hover{border-color:var(--mid);color:var(--ink)}
.cat-tab.active{background:var(--forest);color:#fff;border-color:var(--forest)}
.ct-ct{font-family:"Geist Mono",monospace;font-size:9px;opacity:.65}

/* GENUS */
.genus-block{margin-bottom:30px}
.genus-hdr{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.genus-nm{font-family:"Cormorant Garamond",serif;font-size:19px;font-style:italic;color:var(--forest)}
.genus-pill{font-family:"Geist Mono",monospace;font-size:8px;letter-spacing:.8px;background:var(--mist);color:var(--sage);border:1px solid rgba(46,158,114,0.15);padding:2px 8px;border-radius:99px}
.genus-ln{flex:1;height:1px;background:var(--faint)}

/* PLANT GRID & CARD */
.plant-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(275px,1fr));gap:15px}
.plant-card{background:rgba(250,247,242,0.86);border-radius:16px;border:1px solid rgba(0,0,0,0.06);overflow:hidden;box-shadow:var(--sh);cursor:pointer;transition:transform .2s,box-shadow .2s;animation:fadeUp .3s ease both}
.plant-card:hover{transform:translateY(-2px);box-shadow:var(--sh2)}
.plant-card.dead{opacity:0.5;filter:grayscale(0.6)}
.card-img{height:155px;background:linear-gradient(150deg,var(--mist),var(--mint));position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.card-img img{width:100%;height:100%;object-fit:cover}
.card-emoji{font-size:52px;opacity:.35}
.loc-badge{position:absolute;top:9px;right:9px;background:rgba(255,255,255,0.9);backdrop-filter:blur(6px);border-radius:99px;padding:3px 9px;font-family:"Geist Mono",monospace;font-size:9px;letter-spacing:.8px;color:var(--forest);border:1px solid rgba(255,255,255,0.7)}
.cat-badge{position:absolute;top:9px;left:9px;border-radius:99px;padding:3px 9px;font-family:"Geist Mono",monospace;font-size:9px;letter-spacing:.5px;border:1px solid}
.cat-aroid{background:rgba(238,235,255,0.92);color:#4433a8;border-color:rgba(68,51,168,0.2)}
.cat-flower{background:rgba(252,232,242,0.92);color:#9e2060;border-color:rgba(158,32,96,0.18)}
.cat-herb{background:rgba(237,247,242,0.92);color:var(--forest);border-color:rgba(46,158,114,0.2)}
.cat-veg{background:rgba(255,248,225,0.92);color:#7a4500;border-color:rgba(192,120,8,0.2)}
.cat-tree{background:rgba(230,242,230,0.92);color:#2a6e2a;border-color:rgba(42,110,42,0.2)}
.cat-succulent{background:rgba(255,240,230,0.92);color:#b85020;border-color:rgba(184,80,32,0.2)}
.cat-other{background:rgba(240,240,238,0.92);color:#555;border-color:rgba(0,0,0,0.1)}
.health-dot{position:absolute;bottom:9px;right:9px;width:9px;height:9px;border-radius:50%;border:2px solid rgba(255,255,255,0.8)}
.hd-h{background:#3da882}.hd-c{background:#d4870a}.hd-u{background:#c94040}.hd-dead{background:#888}
.card-body{padding:12px 14px 10px}
.card-name{font-size:14px;font-weight:700;color:var(--forest);line-height:1.2}
.card-sci{font-family:"Cormorant Garamond",serif;font-style:italic;font-size:12px;color:var(--muted);margin-top:1px}
.card-age{font-family:"Geist Mono",monospace;font-size:9px;color:var(--muted);margin-top:5px;letter-spacing:.4px}
.card-chips{display:flex;gap:4px;flex-wrap:wrap;margin-top:7px}
.chip{font-family:"Geist Mono",monospace;font-size:9px;padding:2px 7px;border-radius:99px;border:1px solid;letter-spacing:.3px}
.chip-soil{background:#f5f0e8;color:#6b5030;border-color:#e8ddc8}
.chip-stage{background:var(--lav);color:var(--lav-ink);border-color:#d8d0f8}
.sched-stack{margin-top:7px;display:flex;flex-direction:column;gap:3px}
.si{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:6px;font-size:10px;font-weight:500}
.si-ico{font-size:11px;flex-shrink:0}
.s-ok{background:var(--mist);color:var(--forest)}
.s-due{background:var(--amber-bg);color:#7a4200}
.s-ov{background:var(--red-bg);color:#8a2020}
.s-no{background:#f5f3ef;color:var(--mid)}
.card-foot{padding:8px 14px 12px;display:flex;gap:5px;border-top:1px solid var(--bdr)}
.cf-btn{flex:1;padding:6px 4px;border-radius:6px;border:1px solid var(--faint);background:none;font-size:10px;font-weight:600;color:var(--mid);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;transition:all .15s}
.cf-btn:hover{background:var(--mist);border-color:var(--mint)}
.cf-btn:active{transform:scale(0.93)}
.cf-ico{font-size:13px}
.cf-p{background:var(--forest);color:#fff;border-color:var(--forest)}
.cf-p:hover{background:var(--moss);border-color:var(--moss)}
.cf-d{color:var(--red);border-color:rgba(184,48,48,0.18)}
.cf-d:hover{background:var(--red-bg)}

/* DETAIL OVERLAY */
.det-overlay{position:fixed;inset:0;z-index:400;background:rgba(10,10,8,0.65);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s ease}
.det-box{background:var(--s1);border-radius:20px;width:100%;max-width:820px;max-height:90vh;overflow:hidden;display:grid;grid-template-columns:320px 1fr;box-shadow:0 24px 80px rgba(0,0,0,0.2);animation:scaleIn .25s cubic-bezier(.22,.68,0,1.1)}
.det-left{position:relative;background:linear-gradient(150deg,var(--mist),var(--mint));min-height:360px;display:flex;align-items:flex-end;overflow:hidden}
.det-left img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.det-left-inner{position:relative;z-index:1;padding:20px;width:100%;background:linear-gradient(to top,rgba(10,46,34,0.85) 0%,transparent 55%)}
.det-pname{font-size:20px;font-weight:900;color:#fff;line-height:1.15}
.det-sci{font-family:"Cormorant Garamond",serif;font-style:italic;font-size:14px;color:rgba(255,255,255,0.68);margin-top:2px}
.det-badges{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
.det-close{position:absolute;top:12px;right:12px;z-index:10;background:rgba(255,255,255,0.9);border:none;border-radius:99px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;color:var(--mid)}
.det-close:hover{background:#fff}
.det-right{padding:24px 24px 20px;overflow-y:auto;max-height:90vh;display:flex;flex-direction:column;gap:16px}
.det-sec-t{font-family:"Geist Mono",monospace;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--faint)}
.det-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.dgi{background:var(--s2);border-radius:8px;padding:9px 11px}
.dgi-lbl{font-family:"Geist Mono",monospace;font-size:8px;letter-spacing:1px;color:var(--muted);margin-bottom:2px}
.dgi-val{font-size:12px;font-weight:600;color:var(--ink)}
.det-logs{display:flex;flex-direction:column;gap:5px;max-height:180px;overflow-y:auto}
.det-log-it{background:var(--s2);border-radius:7px;padding:9px 11px}
.dli-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.dli-date{font-family:"Geist Mono",monospace;font-size:9px;color:var(--muted)}
.dli-tags{display:flex;gap:3px;flex-wrap:wrap}
.dli-note{font-family:"Cormorant Garamond",serif;font-size:12px;font-style:italic;color:var(--muted);margin-top:3px}
.det-actions{display:flex;gap:7px;padding-top:12px;border-top:1px solid var(--faint);margin-top:auto}
.da-btn{flex:1;padding:9px;border-radius:8px;border:1px solid var(--faint);background:none;font-size:11px;font-weight:600;color:var(--mid);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .15s}
.da-btn:hover{background:var(--mist);border-color:var(--mint)}
.da-p{background:var(--forest);color:#fff;border-color:var(--forest)}
.da-p:hover{background:var(--moss)}
.da-d{color:var(--red);border-color:rgba(184,48,48,0.18)}
.da-d:hover{background:var(--red-bg)}

/* LOG TABLE */
.log-wrap{background:rgba(250,247,242,0.88);border-radius:14px;border:1px solid rgba(0,0,0,0.05);box-shadow:var(--sh);overflow:hidden}
.log-hdr{padding:15px 20px;border-bottom:1px solid var(--faint);display:flex;justify-content:space-between;align-items:center}
.lh-t{font-size:12px;font-weight:700;color:var(--forest)}
.lh-c{font-family:"Geist Mono",monospace;font-size:9px;color:var(--muted)}
.log-row{display:grid;grid-template-columns:150px 1fr auto auto;gap:13px;align-items:center;padding:12px 20px;border-bottom:1px solid rgba(0,0,0,0.04);transition:background .1s;animation:fadeIn .3s ease both}
.log-row:last-child{border-bottom:none}
.log-row:hover{background:var(--mist)}
.lr-nm{font-size:13px;font-weight:600;color:var(--forest)}
.lr-dt{font-family:"Geist Mono",monospace;font-size:9px;color:var(--muted);margin-top:2px;letter-spacing:.4px}
.lr-tags{display:flex;gap:4px;flex-wrap:wrap}
.lr-sc{font-family:"Geist Mono",monospace;font-size:9px;color:var(--mid);display:flex;flex-direction:column;gap:3px}
.lr-acts{display:flex;gap:5px;align-items:center}
.lr-edit{background:none;border:1px solid var(--faint);border-radius:6px;padding:4px 9px;font-family:"Geist Mono",monospace;font-size:9px;color:var(--sage);cursor:pointer;letter-spacing:.4px}
.lr-edit:hover{background:var(--mist)}
.lr-del{background:none;border:none;font-size:13px;cursor:pointer;color:var(--faint);padding:4px}
.lr-del:hover{color:var(--red)}

/* REMINDERS */
.rem-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.rem-sec-t{font-family:"Geist Mono",monospace;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;padding-bottom:5px;border-bottom:1px solid var(--faint)}
.rem-card{background:rgba(250,247,242,0.88);border:1px solid rgba(0,0,0,0.05);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:11px;margin-bottom:8px;box-shadow:var(--sh);transition:transform .15s}
.rem-card:hover{transform:translateX(2px)}
.rem-card.rf{border-left:3px solid var(--amber)}
.rem-card.rw{border-left:3px solid var(--sage)}
.rem-card.rov{border-left:3px solid var(--red)}
.rem-av{width:38px;height:38px;border-radius:9px;background:linear-gradient(135deg,var(--mist),var(--mint));display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;overflow:hidden}
.rem-av img{width:100%;height:100%;object-fit:cover}
.rem-name{font-size:13px;font-weight:600;color:var(--forest)}
.rem-info{font-size:11px;font-weight:400;margin-top:2px}
.ri-w{color:var(--moss)}.ri-f{color:var(--amber)}.ri-ov{color:var(--red)}
.rem-log{flex-shrink:0;background:var(--forest);color:#fff;border:none;border-radius:7px;padding:6px 11px;font-size:10px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:4px}
.rem-log:hover{background:var(--moss)}

/* INSIGHTS */
.ins-stats{display:grid;grid-template-columns:repeat(5,1fr);gap:13px;margin-bottom:22px}
.ins-stat{background:rgba(250,247,242,0.88);border:1px solid rgba(0,0,0,0.05);border-radius:14px;padding:17px 15px;box-shadow:var(--sh);position:relative;overflow:hidden}
.ins-stat::after{content:"";position:absolute;bottom:-16px;right:-16px;width:60px;height:60px;border-radius:50%;background:rgba(46,158,114,0.06)}
.is-lbl{font-family:"Geist Mono",monospace;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.is-val{font-size:30px;font-weight:900;color:var(--forest);line-height:1}
.is-sub{font-size:10px;color:var(--muted);margin-top:4px}
.ins-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}

.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cond-block{background:var(--mist);border:1px solid rgba(46,158,114,0.12);border-radius:8px;padding:11px;margin-top:-4px;margin-bottom:12px}

.btn-p:hover{background:var(--moss)}.btn-p:active{transform:scale(0.98)}
.btn-cancel{width:100%;padding:9px;background:none;border:none;font-family:"Montserrat",sans-serif;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;margin-top:5px}
.btn-danger{color:var(--red)!important}
.empty{text-align:center;padding:52px 24px}
.e-ico{font-size:44px;margin-bottom:11px;opacity:.32}

.e-s{font-size:12px;color:var(--muted);line-height:1.6}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* Welcome page extras */
.wlc-left{}
.wlc-nu-row:last-child{border-bottom:none}
.wlc-nu-av img{width:100%;height:100%;object-fit:cover}

.lc-btn:hover{border-color:var(--sage);color:var(--sage)}

/* ── WELCOME SCREEN (techy-minimal) ── */
.welcome-wrap{width:100%;min-height:calc(100vh - 64px);display:grid;grid-template-columns:1fr 320px;grid-template-rows:auto 1fr;gap:0;background:transparent}

/* Hero: left column top */
.wlc-hero{grid-column:1;grid-row:1;padding:44px 48px 32px;display:flex;flex-direction:column;gap:0;border-right:1px solid rgba(0,0,0,0.07)}

/* Terminal-style date line */
.wlc-date{font-family:"Geist Mono",monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.wlc-date::before{content:">";color:var(--sage);font-size:12px;font-weight:700}

/* Clock — huge mono */
.wlc-clock{font-family:"Geist Mono",monospace;font-size:clamp(64px,9vw,108px);font-weight:300;color:var(--forest);line-height:1;letter-spacing:-4px;margin-bottom:0}

@keyframes colonBlink{0%,100%{opacity:1}50%{opacity:0.15}}

.wlc-pun-line{font-family:"Montserrat",sans-serif;font-size:clamp(14px,1.6vw,20px);font-weight:300;color:var(--mid);margin-bottom:4px;line-height:1.3}
.wlc-pun-line em{font-style:normal;font-weight:700;color:var(--forest)}
.wlc-sub{font-family:"Cormorant Garamond",serif;font-size:17px;font-style:italic;color:var(--muted);margin-bottom:32px;line-height:1.5}

/* Stats row — minimal mono */

.ws-num{font-family:"Montserrat",sans-serif;font-size:28px;font-weight:900;color:var(--forest);line-height:1}
.ws-lbl{font-family:"Geist Mono",monospace;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}

/* Alerts */
.wlc-alerts{display:flex;flex-direction:column;gap:6px;margin-bottom:24px}

/* CTA — minimal text links */

.cta-p{background:var(--forest);color:#fff}

.cta-g{background:rgba(250,247,242,0.9);border:1.5px solid rgba(0,0,0,0.08);color:var(--mid)}

/* Weather strip inside hero */

.wx-page{width:100%;display:flex;flex-direction:column;gap:16px}

/* ── HERO ── */
.wx-hero{

  position:relative;

  color:#fff;
}
/* subtle noise texture overlay */
.wx-hero::before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,.012) 2px,rgba(255,255,255,.012) 4px);pointer-events:none}

// ── DB helpers ────────────────────────────────────────────────────────────────

// Map app plant object → DB row
function plantToRow(p) {
  return {
    plant_id:      p.PlantID,
    user_id:       currentUserId,
    plant_name:    p.PlantName,
    genus:         p.Genus,
    species:       p.Species,
    location:      p.Location,
    soil_id:       p.SoilID || null,
    photo:         p.photo || null,
    purchase_date: p.purchaseDate || null,
    dead:          !!p.dead,
    died_date:     p.diedDate || null,
    category:      p.category || 'other',
    cultivar:      p.Cultivar || null,
    leaf_count:    p.leafCount || null
  };
}

// Map DB row → app plant object
function rowToPlant(r) {
  return {
    PlantID:      r.plant_id,
    PlantName:    r.plant_name,
    Genus:        r.genus,
    Species:      r.species,
    Location:     r.location,
    SoilID:       r.soil_id,
    photo:        r.photo,
    purchaseDate: r.purchase_date,
    dead:         r.dead,
    diedDate:     r.died_date,
    category:     r.category,
    Cultivar:     r.cultivar || null,
    leafCount:    r.leaf_count || null
  };
}

// Map app log object → DB row
function logToRow(l) {
  return {
    log_id:             l.LogID,
    plant_id:           l.PlantID,
    user_id:            currentUserId,
    log_date:           l.LogDate,
    health_status:      l.HealthStatus,
    plant_stage:        l.PlantStage,
    water:              !!l.Water,
    new_growth:         !!l.NewGrowth,
    new_leaves:         !!l.NewLeaves,
    new_leaf_count:     l.NewLeafCount || 0,
    fertiliser_used:    l.FertiliserUsed || null,
    next_fert_date:     l.NextFertDate || null,
    next_watering_date: l.NextWateringDate || null,
    pot_type:           l.PotType || null,
    pot_size:           l.PotSize || null,
    weekly_note:        l.WeeklyNote || null,
    damage_types:       l.DamageTypes && l.DamageTypes.length ? l.DamageTypes : null,
    notes:              l.Notes || null
  };
}

// Map DB row → app log object
function rowToLog(r) {
  return {
    LogID:             r.log_id,
    PlantID:           r.plant_id,
    LogDate:           r.log_date,
    HealthStatus:      r.health_status,
    PlantStage:        r.plant_stage,
    Water:             r.water,
    NewGrowth:         r.new_growth,
    NewLeaves:         r.new_leaves,
    NewLeafCount:      r.new_leaf_count,
    FertiliserUsed:    r.fertiliser_used,
    NextFertDate:      r.next_fert_date,
    NextWateringDate:  r.next_watering_date,
    PotType:           r.pot_type,
    PotSize:           r.pot_size,
    WeeklyNote:        r.weekly_note,
    DamageTypes:       r.damage_types,
    Notes:             r.notes
  };
}

// Load all plants for current user
async function dbLoadPlants() {
  if(!supa || !currentUserId) return;
  var res = await supa.from('plants').select('*').eq('user_id', currentUserId);
  if(res.error) { console.error('dbLoadPlants', res.error); return; }
  plants = res.data.map(rowToPlant);
  // Sync to localStorage as cache
  save('lpb5_plants', plants);
}

// Load all logs for current user
async function dbLoadLogs() {
  if(!supa || !currentUserId) return;
  var res = await supa.from('plant_logs').select('*').eq('user_id', currentUserId).order('log_date', {ascending: true});
  if(res.error) { console.error('dbLoadLogs', res.error); return; }
  logs = res.data.map(rowToLog);
  save('lpb5_logs', logs);
}

// Upsert a single plant
async function dbSavePlant(p) {
  if(!supa || !currentUserId) return;
  var res = await supa.from('plants').upsert(plantToRow(p));
  if(res.error) console.error('dbSavePlant', res.error);
}

// Delete a plant
async function dbDeletePlant(plantId) {
  if(!supa || !currentUserId) return;
  var res = await supa.from('plants').delete().eq('plant_id', plantId);
  if(res.error) console.error('dbDeletePlant', res.error);
}

// Upsert a single log
async function dbSaveLog(l) {
  if(!supa || !currentUserId) return;
  var res = await supa.from('plant_logs').upsert(logToRow(l));
  if(res.error) console.error('dbSaveLog', res.error);
}

// Delete a log
async function dbDeleteLog(logId) {
  if(!supa || !currentUserId) return;
  var res = await supa.from('plant_logs').delete().eq('log_id', logId);
  if(res.error) console.error('dbDeleteLog', res.error);
}

// Look up user by name in DB
async function dbGetUser(name) {
  if(!supa) return null;
  var res = await supa.from('users').select('*').eq('name', name).maybeSingle();
  if(res.error) { console.error('dbGetUser', res.error); return null; }
  return res.data;
}

// Create or update user PIN
async function dbSaveUser(name, pinHash) {
  if(!supa) return;
  var res = await supa.from('users').upsert({name: name, pin_hash: pinHash}, {onConflict: 'name'});
  if(res.error) console.error('dbSaveUser', res.error);
  // Reload to get id
  var u = await dbGetUser(name);
  return u;
}

// Load all data for user after login
async function dbLoadAll() {
  showLoadingOverlay(true);
  await dbLoadPlants();
  await dbLoadLogs();
  showLoadingOverlay(false);
  render();
}

function showLoadingOverlay(show) {
  var el = document.getElementById('db-loading');
  if(el) el.style.display = show ? 'flex' : 'none';
}

var authMode = 'signin'; // 'signin' | 'signup' | 'forgot'

function showAuth(mode) {
  authMode = mode || 'signin';
  var host = document.getElementById('auth-host');
  if(host){ host.style.display='flex'; buildAuthScreen(); }
}

function hideAuth() {
  var host = document.getElementById('auth-host');
  if(host){ host.innerHTML=''; host.style.display='none'; }
}

function buildAuthScreen() {
  var host = document.getElementById('auth-host');
  if(!host) return;
  host.innerHTML = '';
  var overlay = document.createElement('div'); overlay.className = 'auth-screen';
  var card = document.createElement('div'); card.className = 'auth-card';
  var logo = document.createElement('img');
  logo.className = 'auth-logo';
  logo.src = 'data:image/jpeg;base64,' + LOGO_B64;
  card.appendChild(logo);
  if(authMode === 'signin')       buildSignIn(card);
  else if(authMode === 'signup')  buildSignUp(card);
  else if(authMode === 'forgot')  buildForgot(card);
  overlay.appendChild(card);
  host.appendChild(overlay);
  setTimeout(function(){ var f=card.querySelector('.auth-input'); if(f)f.focus(); }, 80);
}

// ── helpers ──────────────────────────────────────────────────────────────────
function authEl(tag, cls, text) {
  var e=document.createElement(tag);
  if(cls) e.className=cls;
  if(text) e.textContent=text;
  return e;
}
function authField(label, type, placeholder) {
  var wrap=authEl('div','auth-field');
  var lbl=authEl('label','auth-label',label); wrap.appendChild(lbl);
  if(type==='password'){
    var row=authEl('div','auth-input-row');
    var inp=document.createElement('input'); inp.type='password'; inp.placeholder=placeholder; inp.className='auth-input';
    var eye=authEl('button','auth-eye');
    var eyeOpen='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
    var eyeOff='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19M1 1l22 22"/></svg>';
    eye.innerHTML=eyeOpen; eye.type='button';
    var vis=false;
    eye.onclick=function(){ vis=!vis; inp.type=vis?'text':'password'; eye.innerHTML=vis?eyeOff:eyeOpen; };
    row.appendChild(inp); row.appendChild(eye); wrap.appendChild(row);
  } else {
    var inp=document.createElement('input'); inp.type=type; inp.placeholder=placeholder; inp.className='auth-input';
    wrap.appendChild(inp);
  }
  return wrap;
}
function authMsg(card) {
  var m=authEl('div','auth-msg'); m.id='auth-msg'; card.appendChild(m); return m;
}

// ── SIGN IN ───────────────────────────────────────────────────────────────────
function buildSignIn(card) {
  card.appendChild(authEl('div','auth-title','Welcome back'));
  card.appendChild(authEl('div','auth-sub','Sign in to your garden'));
  var form=authEl('div','auth-form');
  var emailF=authField('Email','email','you@example.com');
  var passF=authField('Password','password','••••••••');
  var emailI=emailF.querySelector('input');
  var passI=passF.querySelector('input');
  form.appendChild(emailF); form.appendChild(passF);
  authMsg(card);
  var btn=authEl('button','auth-btn auth-btn-primary','Sign in');
  btn.onclick=function(){
    var email=emailI.value.trim(), pass=passI.value;
    if(!email||!pass){showMsg('Please fill in all fields.');return;}
    btn.disabled=true; btn.textContent='Signing in\u2026';
    supa.auth.signInWithPassword({email:email,password:pass}).then(function(r){
      if(r.error){btn.disabled=false;btn.textContent='Sign in';showMsg(r.error.message);}
      else onAuthSuccess(r.data.user);
    });
  };
  [emailI,passI].forEach(function(i){i.addEventListener('keydown',function(e){if(e.key==='Enter')btn.click();});});
  form.appendChild(btn); card.appendChild(form);
  var div=authEl('div','auth-divider'); div.appendChild(authEl('span',null,'OR')); card.appendChild(div);
  var sw=authEl('div','auth-switch');
  sw.innerHTML="Don\u2019t have an account? <button onclick=\"authMode='signup';buildAuthScreen()\">Create one</button>";
  card.appendChild(sw);
  var sw2=authEl('div','auth-switch'); sw2.style.marginTop='8px';
  sw2.innerHTML="<button onclick=\"authMode='forgot';buildAuthScreen()\">Forgot password?</button>";
  card.appendChild(sw2);
}

// ── SIGN UP ───────────────────────────────────────────────────────────────────
function buildSignUp(card) {
  card.appendChild(authEl('div','auth-title','Create account'));
  card.appendChild(authEl('div','auth-sub','Start tracking your garden'));
  var form=authEl('div','auth-form');
  var nameF=authField('Display name','text','e.g. Vümboni');
  var emailF=authField('Email','email','you@example.com');
  var passF=authField('Password','password','Min 6 characters');
  var pass2F=authField('Confirm password','password','Repeat password');
  var nameI=nameF.querySelector('input');
  var emailI=emailF.querySelector('input');
  var passI=passF.querySelector('input');
  var pass2I=pass2F.querySelector('input');
  form.appendChild(nameF); form.appendChild(emailF);
  form.appendChild(passF); form.appendChild(pass2F);
  authMsg(card);
  var btn=authEl('button','auth-btn auth-btn-primary','Create account');
  btn.onclick=function(){
    var name=nameI.value.trim(), email=emailI.value.trim();
    var pass=passI.value, pass2=pass2I.value;
    if(!name||!email||!pass||!pass2){showMsg('Please fill in all fields.');return;}
    if(pass!==pass2){showMsg("Passwords don\u2019t match.");return;}
    if(pass.length<6){showMsg('Password must be at least 6 characters.');return;}
    btn.disabled=true; btn.textContent='Creating account\u2026';
    supa.auth.signUp({email:email,password:pass,options:{data:{display_name:name}}}).then(function(r){
      if(r.error){btn.disabled=false;btn.textContent='Create account';showMsg(r.error.message);return;}
      if(r.data.session){onAuthSuccess(r.data.user);return;}
      // Email confirmation needed
      card.innerHTML='';
      var logo=document.createElement('img');logo.className='auth-logo';logo.src='data:image/jpeg;base64,'+LOGO_B64;card.appendChild(logo);
      card.appendChild(authEl('div','auth-title','Check your email'));
      card.appendChild(authEl('div','auth-sub','CONFIRM YOUR EMAIL TO CONTINUE'));
      var info=authEl('div',null,'We sent a confirmation link to '+email+'. Click it to activate your account, then sign in here.');
      info.style.cssText='font-family:Montserrat,sans-serif;font-size:13px;color:var(--mid);line-height:1.65;margin:16px 0;text-align:left';
      var spam=authEl('div',null,"Don\u2019t see it? Check your spam folder.");
      spam.style.cssText='font-family:Geist Mono,monospace;font-size:9px;color:var(--muted);margin-bottom:16px;text-align:left';
      card.appendChild(info); card.appendChild(spam);
      var backBtn=authEl('button','auth-btn auth-btn-primary','Back to sign in');
      backBtn.onclick=function(){authMode='signin';buildAuthScreen();};
      card.appendChild(backBtn);
    });
  };
  form.appendChild(btn); card.appendChild(form);
  var sw=authEl('div','auth-switch');
  sw.innerHTML="Already have an account? <button onclick=\"authMode='signin';buildAuthScreen()\">Sign in</button>";
  card.appendChild(sw);
}

// ── FORGOT PASSWORD ───────────────────────────────────────────────────────────
function buildForgot(card) {
  card.appendChild(authEl('div','auth-title','Reset password'));
  card.appendChild(authEl('div','auth-sub',"ENTER YOUR EMAIL AND WE'LL SEND A LINK"));
  var form=authEl('div','auth-form');
  var emailF=authField('Email','email','you@example.com');
  var emailI=emailF.querySelector('input');
  form.appendChild(emailF);
  authMsg(card);
  var btn=authEl('button','auth-btn auth-btn-primary','Send reset link');
  btn.onclick=function(){
    var email=emailI.value.trim();
    if(!email){showMsg('Please enter your email.');return;}
    btn.disabled=true; btn.textContent='Sending\u2026';
    supa.auth.resetPasswordForEmail(email,{
      redirectTo:'https://brainiacsloth.github.io/lumiere-plant-babies/'
    }).then(function(r){
      if(r.error){btn.disabled=false;btn.textContent='Send reset link';showMsg(r.error.message);}
      else{showMsg('Reset link sent! Check your inbox.',true);btn.textContent='Sent \u2713';}
    });
  };
  emailI.addEventListener('keydown',function(e){if(e.key==='Enter')btn.click();});
  form.appendChild(btn); card.appendChild(form);
  var sw=authEl('div','auth-switch');
  sw.innerHTML="<button onclick=\"authMode='signin';buildAuthScreen()\">\u2190 Back to sign in</button>";
  card.appendChild(sw);
}

// ── ON SUCCESS ────────────────────────────────────────────────────────────────
function onAuthSuccess(user) {
  currentUser = {
    name: (user.user_metadata&&user.user_metadata.display_name) || user.email.split('@')[0],
    email: user.email,
    id: user.id
  };
  currentUserId = user.id;
  save('lpb5_user', currentUser);
  hideAuth();
  _appStarted = true;
  greetIdx=Math.floor(Math.random()*GREETINGS.length);
  subIdx=(greetIdx+1+Math.floor(Math.random()*(GREETINGS.length-1)))%GREETINGS.length;
  punIdx=Math.floor(Math.random()*PUNS.length);
  dbLoadAll();
}

function signOut() {
  supa.auth.signOut().then(function(){
    currentUser=null; currentUserId=null;
    plants=[]; logs=[];
    save('lpb5_user',null);
    view='welcome';

}

// ── CHECK AUTH ON LOAD ────────────────────────────────────────────────────────
function checkAuth() {
  supa.auth.getSession().then(function(r){

      onAuthSuccess(r.data.session.user);

      showAuth('signin');

}

function uuid(){return"xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g,function(c){var r=Math.random()*16|0;return(c==="x"?r:(r&0x3|0x8)).toString(16);});}
function toDS(d){var dt=d?new Date(d):new Date();return dt.toISOString().slice(0,10);}
function addDays(ds,n){var d=new Date(ds);d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}
function daysUntil(ds){if(!ds)return null;return Math.round((new Date(ds)-new Date(toDS()))/86400000);}
function fmt(ds){if(!ds)return"\u2014";return new Date(ds).toLocaleDateString("en-ZA",{day:"numeric",month:"short",year:"numeric"});}
function fmtS(ds){if(!ds)return"\u2014";return new Date(ds).toLocaleDateString("en-ZA",{weekday:"short",day:"numeric",month:"short"});}
function daysOld(ds){if(!ds)return null;return Math.floor((Date.now()-new Date(ds))/86400000);}
function ageStr(days){if(days===null)return"Unknown age";if(days<30)return days+"d old";if(days<365){var m=Math.floor(days/30);return m+"mo old";}var y=Math.floor(days/365),mo=Math.floor((days%365)/30);return y+"y"+(mo?(" "+mo+"mo"):"")+" old";}
function soilName(id){var s=SOIL.filter(function(x){return x.id===+id;})[0];return s?s.n:"Unknown";}
function lastLog(id){return logs.filter(function(l){return l.PlantID===id;}).sort(function(a,b){return new Date(b.LogDate)-new Date(a.LogDate);})[0]||null;}
function nextWD(id){var l=logs.filter(function(x){return x.PlantID===id&&x.NextWateringDate;}).sort(function(a,b){return new Date(b.LogDate)-new Date(a.LogDate);})[0];return l?l.NextWateringDate:null;}
function nextFD(id){var l=logs.filter(function(x){return x.PlantID===id&&x.NextFertDate;}).sort(function(a,b){return new Date(b.LogDate)-new Date(a.LogDate);})[0];return l?l.NextFertDate:null;}
function needsWater(p){if(p.dead)return false;var d=daysUntil(nextWD(p.PlantID));return d===null||d<=0;}
function needsFert(p){if(p.dead)return false;var d=daysUntil(nextFD(p.PlantID));return d!==null&&d<=0;}
function catInfo(id){return CATS.filter(function(c){return c.id===id;})[0]||{id:"other",label:"Other",ico:"\uD83E\uDEF4"};}
function plantEmoji(p){var m={aroid:"\uD83C\uDF3F",flower:"\uD83C\uDF37",herb:"\uD83C\uDF3F",veg:"\uD83E\uDD66",tree:"\uD83C\uDF33",succulent:"\uD83C\uDF35",other:"\uD83E\uDEF4"};return m[p.category]||"\uD83E\uDEF4";}
function timeOfDay(){var h=new Date().getHours();if(h<12)return"morning";if(h<17)return"afternoon";return"evening";}
function fmtClock(d){var h=d.getHours();var m=String(d.getMinutes()).padStart(2,"0");return h+":"+m;}
function fmtDate(d){return d.toLocaleDateString("en-ZA",{weekday:"long",day:"numeric",month:"long",year:"numeric"});}

function el(tag,props,children){
  var e=document.createElement(tag);
  if(props)Object.keys(props).forEach(function(k){var v=props[k];
    if(k==="cls")e.className=v;else if(k==="txt")e.textContent=v;else if(k==="html")e.innerHTML=v;
    else if(k==="css")e.style.cssText=v;else if(k.indexOf("on")===0)e[k]=v;else e.setAttribute(k,v);
  });
  if(children)children.forEach(function(c){if(c)e.appendChild(typeof c==="string"?document.createTextNode(c):c);});
  return e;
}

function buildWeatherAlerts(){
// ── WEATHER ALERTS (dynamic, severity-coded) ──────────────────────────────
if(wxData){
  var alerts2=[];

  // ── Current conditions ────────────────────────────────────────────────
  // Heat
  if(wxData.temp>=35){
    alerts2.push({sev:3,ico:"\uD83D\uDD25",title:"EXTREME HEAT",msg:wxData.temp+"\u00b0C \u2014 mist foliage, move indoor plants away from glass, water at dusk",col:"#b83030"});
  } else if(wxData.temp>=30){
    alerts2.push({sev:2,ico:"\u2600\uFE0F",title:"HEAT ADVISORY",msg:wxData.temp+"\u00b0C \u2014 water early morning before heat peaks, check soil moisture",col:"#c07808"});
  }
  // Wind
  if(wxData.wind>=60){
    alerts2.push({sev:3,ico:"\uD83C\uDF2A\uFE0F",title:"STORM-FORCE WIND",msg:wxData.wind+"km/h \u2014 bring all outdoor plants inside immediately",col:"#b83030"});
  } else if(wxData.wind>=40){
    alerts2.push({sev:2,ico:"\uD83C\uDF2C\uFE0F",title:"HIGH WIND",msg:wxData.wind+"km/h \u2014 secure pots, stakes and trellises outdoors",col:"#4433a8"});
  } else if(wxData.wind>=25){
    alerts2.push({sev:1,ico:"\uD83D\uDCA8",title:"WIND ADVISORY",msg:wxData.wind+"km/h \u2014 lightweight pots may topple, check outdoor containers",col:"#7a60cc"});
  }
  // Rain
  if(wxData.precip>=10){
    alerts2.push({sev:3,ico:"\uD83C\uDF27\uFE0F",title:"HEAVY RAIN",msg:wxData.precip+"mm now \u2014 ensure drainage holes are clear, reduce watering",col:"#185fa5"});
  } else if(wxData.precip>=3){
    alerts2.push({sev:2,ico:"\uD83D\uDCA7",title:"MODERATE RAIN",msg:wxData.precip+"mm \u2014 skip watering outdoor plants today",col:"#2e7fa5"});
  } else if(wxData.precip>=1){
    alerts2.push({sev:1,ico:"\uD83C\uDF26\uFE0F",title:"LIGHT RAIN",msg:wxData.precip+"mm \u2014 outdoor plants should be fine without supplemental water",col:"#3a9e80"});
  }
  // Humidity
  if(wxData.humidity>=90){
    alerts2.push({sev:2,ico:"\uD83E\uDED7",title:"HIGH HUMIDITY",msg:wxData.humidity+"% \u2014 watch for mould and fungal issues, improve air circulation",col:"#6a3a8a"});
  }

  // ── Forecast-based dynamic change alerts ─────────────────────────────
  if(wxForecast){
    var temps=wxForecast.temperature_2m_max;
    var winds=wxForecast.wind_speed_10m_max;
    var rains=wxForecast.precipitation_sum;
    var hums=wxForecast.relative_humidity_2m_max;

    // Today's forecast high
    var todayHi=Math.round(temps[0]);
    if(todayHi>=35&&wxData.temp<35){
      alerts2.push({sev:3,ico:"\uD83D\uDD25",title:"EXTREME HEAT TODAY",msg:"Forecast high "+todayHi+"\u00b0C \u2014 water now before midday, shade heat-sensitive plants",col:"#b83030"});
    } else if(todayHi>=30&&wxData.temp<30){
      alerts2.push({sev:2,ico:"\u2600\uFE0F",title:"HEAT ALERT TODAY",msg:"High of "+todayHi+"\u00b0C expected \u2014 water early, avoid fertilising in peak heat",col:"#c07808"});
    }

    // Sharp temperature spike: tomorrow >5°C hotter than today
    for(var di=1;di<6;di++){
      var dayName=di===1?"tomorrow":["","","Wed","Thu","Fri","Sat","Sun"][di];
      var diff=Math.round(temps[di])-Math.round(temps[di-1]);
      if(diff>=7){
        alerts2.push({sev:2,ico:"\uD83D\uDCC8",title:"TEMP SPIKE "+dayName.toUpperCase(),msg:"+"+diff+"\u00b0C jump to "+Math.round(temps[di])+"\u00b0C \u2014 water the day before, increase soil moisture",col:"#c07808"});
        break;
      }
      // Sharp drop (frost risk in Cape Town winters)
      if(diff<=-6&&Math.round(temps[di])<=8){
        alerts2.push({sev:2,ico:"\u2744\uFE0F",title:"COLD SNAP "+dayName.toUpperCase(),msg:"Drop to "+Math.round(temps[di])+"\u00b0C \u2014 bring frost-sensitive tropicals inside",col:"#185fa5"});
        break;
      }
    }

    // Wind spike coming
    var maxForecastWind=Math.max.apply(null,winds.slice(1,4));
    var maxForecastDay=winds.slice(1,4).indexOf(maxForecastWind)+1;
    if(maxForecastWind>=40&&wxData.wind<40){
      var wDayNames=["","tomorrow","in 2 days","in 3 days"];
      alerts2.push({sev:2,ico:"\uD83C\uDF2C\uFE0F",title:"WIND ALERT "+wDayNames[maxForecastDay].toUpperCase(),msg:maxForecastWind+"km/h forecast \u2014 secure outdoor pots before then",col:"#4433a8"});
    }

    // Heavy rain coming
    var maxRain=Math.max.apply(null,rains.slice(1,4));
    if(maxRain>=8){
      var rDayIdx=rains.slice(1,4).indexOf(maxRain)+1;
      var rDayNames=["","tomorrow","in 2 days","in 3 days"];
      alerts2.push({sev:2,ico:"\uD83C\uDF27\uFE0F",title:"HEAVY RAIN "+rDayNames[rDayIdx].toUpperCase(),msg:maxRain.toFixed(0)+"mm expected \u2014 skip watering, check pot drainage now",col:"#185fa5"});
    } else if(rains.slice(1,3).some(function(v){return v>=3;})){
      alerts2.push({sev:1,ico:"\uD83D\uDCA7",title:"RAIN COMING",msg:"Rain forecast in next 2 days \u2014 hold off watering outdoor plants",col:"#2e7fa5"});
    }

    // Dry spell: 5+ days no rain
    var dryCount=0;
    for(var ri=0;ri<7;ri++){if(rains[ri]<0.5)dryCount++;else break;}
    if(dryCount>=5){
      alerts2.push({sev:1,ico:"\uD83C\uDFDC\uFE0F",title:"DRY SPELL AHEAD",msg:dryCount+" dry days forecast \u2014 increase watering frequency for outdoor plants",col:"#b85000"});
    }
  }

  // Sort by severity desc, then deduplicate similar types
  alerts2.sort(function(a,b){return b.sev-a.sev;});

  if(alerts2.length){
    var waWrap=document.createElement("div");
    waWrap.id="wx-alerts-wrap";
    waWrap.style.cssText="display:flex;flex-direction:column;gap:6px;margin-top:16px";

    var waHdr=document.createElement("div");
    waHdr.style.cssText="display:flex;align-items:center;gap:8px;margin-bottom:4px";
    var waPulse=document.createElement("span");
    waPulse.style.cssText="display:inline-block;width:6px;height:6px;border-radius:50%;background:#b83030;animation:sysGlow 1.2s ease-in-out infinite;flex-shrink:0";
    var waTitle=document.createElement("span");
    waTitle.style.cssText="font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--ink);font-weight:700";
    waTitle.textContent="WEATHER ALERTS ("+alerts2.length+")";
    waHdr.appendChild(waPulse);waHdr.appendChild(waTitle);
    waWrap.appendChild(waHdr);

    alerts2.slice(0,4).forEach(function(al){
      var pill=document.createElement("div");
      // Severity border thickness
      var borderW=al.sev===3?"2px":"1px";
      pill.style.cssText="display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-radius:10px;"
        +"border-left:"+borderW+" solid "+al.col+";"
        +"border-top:1px solid "+al.col+"22;"
        +"border-right:1px solid "+al.col+"22;"
        +"border-bottom:1px solid "+al.col+"22;"
        +"background:"+al.col+"0d";
      var icoEl=document.createElement("div");
      icoEl.style.cssText="font-size:18px;flex-shrink:0;line-height:1;margin-top:1px";
      icoEl.textContent=al.ico;
      var txt=document.createElement("div");txt.style.cssText="flex:1;min-width:0";
      var ttl=document.createElement("div");
      ttl.style.cssText="font-family:'Montserrat',sans-serif;font-size:11px;font-weight:800;color:"+al.col+";letter-spacing:.4px;margin-bottom:3px";
      ttl.textContent=al.title;
      var msg=document.createElement("div");
      msg.style.cssText="font-family:'Montserrat',sans-serif;font-size:11px;font-weight:400;color:var(--ink);line-height:1.45;opacity:.8";
      msg.textContent=al.msg;
      txt.appendChild(ttl);txt.appendChild(msg);
      pill.appendChild(icoEl);pill.appendChild(txt);
      waWrap.appendChild(pill);
    });

    if(alerts2.length>4){
      var more=document.createElement("div");
      more.style.cssText="font-family:'Geist Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.5px;text-align:center;padding:4px 0";
      more.textContent="+"+(alerts2.length-4)+" more \u2014 see Weather tab";
      waWrap.appendChild(more);
    }

    var _slot=document.getElementById("wx-alert-slot");if(_slot){_slot.innerHTML="";_slot.appendChild(waWrap);}
  } else if(wxData){
    // All clear
    var clearWrap=document.createElement("div");
    clearWrap.id="wx-alerts-wrap";
    clearWrap.style.cssText="display:flex;align-items:center;gap:8px;margin-top:14px;padding:9px 14px;border-radius:10px;background:rgba(46,158,114,0.06);border:1px solid rgba(46,158,114,0.15)";
    var clearDot=document.createElement("span");
    clearDot.style.cssText="display:inline-block;width:6px;height:6px;border-radius:50%;background:#2e9e72;flex-shrink:0";
    var clearTxt=document.createElement("span");
    clearTxt.style.cssText="font-family:'Geist Mono',monospace;font-size:9px;color:var(--forest);letter-spacing:.8px;font-weight:600";
    clearTxt.textContent="NO WEATHER WARNINGS";
    clearWrap.appendChild(clearDot);clearWrap.appendChild(clearTxt);
    var _slot2=document.getElementById("wx-alert-slot");if(_slot2){_slot2.innerHTML="";_slot2.appendChild(clearWrap);}
  }
}

}

    var ld=new Date(l.LogDate);
    dayBuckets.forEach(function(b){
      var s=new Date(b.date);s.setHours(0,0,0,0);var e=new Date(b.date);e.setHours(23,59,59,999);
      if(ld>=s&&ld<=e)b.count++;
    });
  });
  var maxAct=Math.max.apply(null,dayBuckets.map(function(b){return b.count;}))||1;
  var DNAMES=["SUN","MON","TUE","WED","THU","FRI","SAT"];
  var lblRow=document.createElement("div");lblRow.style.cssText="display:flex;justify-content:space-between";
  dayBuckets.forEach(function(b,i){
    var pct=Math.max(Math.round(b.count/maxAct*100),4);
    var bar=document.createElement("div");
    bar.style.cssText="flex:1;border-radius:2px 2px 0 0;background:"+(i===6?"rgba(46,158,114,0.7)":"rgba(46,158,114,0.22)")+";height:"+pct+"%";
    actBars.appendChild(bar);
    var lbl=document.createElement("div");
    lbl.style.cssText="font-family:'Geist Mono',monospace;font-size:7px;color:var(--muted);letter-spacing:.3px;flex:1;text-align:center";
    lbl.textContent=i===6?"NOW":DNAMES[b.date.getDay()].slice(0,1);
    lblRow.appendChild(lbl);
  });
  actWrap.appendChild(actBars);actWrap.appendChild(lblRow);
  right.appendChild(sidePanel("CARE ACTIVITY / 7D",actWrap));

  // Daily tip
  var tipIdx=(now.getFullYear()*366+now.getMonth()*31+now.getDate()+7)%QUICK_TIPS.length;
  var tip=QUICK_TIPS[tipIdx];
  var tipWrap=document.createElement("div");
  var tipTxt=document.createElement("div");
  tipTxt.style.cssText="font-family:'Cormorant Garamond',serif;font-size:14px;font-style:italic;color:var(--mid);line-height:1.6;margin-bottom:6px";
  tipTxt.textContent=tip[0];
  var tipSrc=document.createElement("div");
  tipSrc.style.cssText="font-family:'Geist Mono',monospace;font-size:8px;color:var(--sage);letter-spacing:.6px";
  tipSrc.textContent=tip[1].toUpperCase();
  tipWrap.appendChild(tipTxt);tipWrap.appendChild(tipSrc);
  right.appendChild(sidePanel("DAILY TIP",tipWrap));

  top.appendChild(right);
  w.appendChild(top);

  parent.appendChild(w);

  // Responsive: mobile collapses to single column
  if(isMobile&&isMobile()){
    top.style.gridTemplateColumns="1fr";
    right.style.borderTop="1px solid rgba(0,0,0,0.07)";
    left.style.padding="20px 16px 16px";
    left.style.borderRight="none";
  }
  // Responsive: listen for resize
  var _resizeWelcome=function(){
    if(!document.getElementById("live-clock"))return;
    var mob=window.innerWidth<=768;
    top.style.gridTemplateColumns=mob?"1fr":"1fr 300px";
    left.style.borderRight=mob?"none":"1px solid rgba(0,0,0,0.07)";
    left.style.padding=mob?"20px 16px 16px":"44px 48px 32px";
    if(mob)right.style.borderTop="1px solid rgba(0,0,0,0.07)";
  };
  window.addEventListener("resize",_resizeWelcome);
}

// ═══ PLANTS ════════════════════════════════════════════════
function renderPlants(parent){
  var alive=plants.filter(function(p){return !p.dead;});
  renderPlantList(parent,alive,false);
}
function renderArchive(parent){
  var dead=plants.filter(function(p){return p.dead;});
  if(!dead.length){parent.appendChild(emptyState("\uD83C\uDF31","No plants in memoriam","Plants you mark as passed will appear here."));return;}
  renderPlantList(parent,dead,true);
}
function renderPlantList(parent,list,isDead){
  // ── Auto-archive check ──────────────────────────────────────────────────
  if(!isDead){
    var autoArchiveDays=90;
    var toArchive=list.filter(function(p){
      if(p.dead)return false;
      var ll=lastLog(p.PlantID);
      if(!ll)return false; // never been logged — don't auto-archive
      var daysSince=Math.floor((Date.now()-new Date(ll.LogDate))/(86400000));
      return daysSince>=autoArchiveDays;
    });
    if(toArchive.length){
      var notice=el("div",{cls:"archive-notice"});
      notice.innerHTML="\uD83D\uDED1 <strong>"+toArchive.length+" plant"+(toArchive.length>1?"s":"")+"</strong> haven\u2019t been logged in "+autoArchiveDays+"+ days \u2014 consider marking as passed";
      parent.appendChild(notice);
    }
  }

  if(!isDead){
    var nw2=list.filter(needsWater);var nf=list.filter(needsFert);
    if(nw2.length||nf.length){
      var bw=el("div",{css:"display:flex;gap:9px;margin-bottom:16px;flex-wrap:wrap"});
      if(nw2.length){var b=el("div",{cls:"alert-pill ap-w"});b.innerHTML="\uD83D\uDCA7 <strong>"+nw2.length+"</strong> need watering";bw.appendChild(b);}
      if(nf.length){var b2=el("div",{cls:"alert-pill ap-f"});b2.innerHTML="\uD83C\uDF3F <strong>"+nf.length+"</strong> need fertilising";bw.appendChild(b2);}
      parent.appendChild(bw);
    }

    // ── Search bar ────────────────────────────────────────────────────────
    var sw=el("div",{cls:"plant-search-wrap"});
    sw.appendChild(el("span",{cls:"plant-search-ico",txt:"\uD83D\uDD0D"}));
    var si=el("input",{cls:"plant-search",type:"text",placeholder:"Search plants by name, genus, cultivar\u2026"});
    si.value=plantSearch;
    var sc=el("button",{cls:"plant-search-clear"+(plantSearch?" visible":""),txt:"\u2715",onclick:function(){plantSearch="";si.value="";sc.className="plant-search-clear";renderPage();}});
    si.oninput=function(e){
      plantSearch=e.target.value;
      sc.className="plant-search-clear"+(plantSearch?" visible":"");
      renderPage();
    };
    sw.appendChild(si);sw.appendChild(sc);
    parent.appendChild(sw);

    // ── Category tabs ─────────────────────────────────────────────────────
    var tabs=el("div",{cls:"cat-tabs"});
    function ctab(id,ico,lbl){
      var ct=id==="all"?list.length:list.filter(function(p){return id==="indoor"?p.Location==="Indoor":id==="outdoor"?p.Location==="Outdoor":p.category===id;}).length;
      if(id!=="all"&&!ct)return null;
      var t=el("button",{cls:"cat-tab"+(activeCat===id?" active":""),onclick:function(){activeCat=id;renderPage();}});
      t.appendChild(el("span",{txt:ico+" "+lbl}));
      t.appendChild(el("span",{cls:"ct-ct",txt:String(ct)}));
      return t;
    }
    tabs.appendChild(ctab("all","\uD83E\uDEF4","All"));
    var it=ctab("indoor","\uD83C\uDFE0","Indoor");if(it)tabs.appendChild(it);
    var ot=ctab("outdoor","\uD83C\uDF33","Garden");if(ot)tabs.appendChild(ot);
    CATS.forEach(function(cat){var t=ctab(cat.id,cat.ico,cat.label);if(t)tabs.appendChild(t);});
    parent.appendChild(tabs);
  }

  // ── Filter by category ───────────────────────────────────────────────────
  var filtered=isDead?list:list.filter(function(p){
    if(activeCat==="all")return true;
    if(activeCat==="indoor")return p.Location==="Indoor";
    if(activeCat==="outdoor")return p.Location==="Outdoor";
    return p.category===activeCat;
  });

  // ── Filter by search ─────────────────────────────────────────────────────
  if(plantSearch&&plantSearch.trim()){
    var q=plantSearch.trim().toLowerCase();
    filtered=filtered.filter(function(p){
      return (p.PlantName||"").toLowerCase().indexOf(q)>=0
          || (p.Genus||"").toLowerCase().indexOf(q)>=0
          || (p.Species||"").toLowerCase().indexOf(q)>=0
          || (p.Cultivar||"").toLowerCase().indexOf(q)>=0;
    });
  }

  if(!filtered.length){
    parent.appendChild(emptyState("\uD83E\uDEF4",
      plantSearch?"No plants match \""+plantSearch+"\"":"No plants here",
      plantSearch?"Try a different search term":"Try a different filter or add a new plant."));
    return;
  }

  // ── Group by genus, render as horizontal scroll rows ─────────────────────
  var gMap={};
  filtered.forEach(function(p){var g=p.Genus||"Unknown";if(!gMap[g])gMap[g]=[];gMap[g].push(p);});

  Object.keys(gMap).sort().forEach(function(genus,gi){
    var sec=el("div",{cls:"genus-block"});
    var genOpen=true;
    var chev=el("span",{css:"font-size:11px;color:var(--muted);transition:transform .22s;flex-shrink:0",txt:"\u25be"});
    var gh=el("div",{cls:"genus-hdr",css:"cursor:pointer;user-select:none",onclick:function(){
      genOpen=!genOpen;
      scrollRow.style.display=genOpen?"flex":"none";
      chev.style.transform=genOpen?"":"rotate(-90deg)";
    }});
    gh.appendChild(el("div",{cls:"genus-nm",txt:genus}));
    gh.appendChild(el("div",{cls:"genus-pill",txt:gMap[genus].length+" plant"+(gMap[genus].length!==1?"s":"")}));
    gh.appendChild(el("div",{cls:"genus-ln"}));
    gh.appendChild(chev);
    sec.appendChild(gh);

    // Horizontal scroll row
    var scrollRow=el("div",{cls:"plant-scroll-row"});
    gMap[genus].forEach(function(p,ci){
      var card=makePlantCard(p);
      card.style.animationDelay=(gi*0.04+ci*0.03)+"s";
      scrollRow.appendChild(card);
    });
    sec.appendChild(scrollRow);
    parent.appendChild(sec);
  });
}

function renderLogs(parent){
  var wrap=el("div",{cls:"log-wrap"});
  var hdr=el("div",{cls:"log-hdr"});
  hdr.appendChild(el("div",{cls:"lh-t",txt:"Care logs"}));
  hdr.appendChild(el("div",{cls:"lh-c",txt:logs.length+" total entries"}));
  wrap.appendChild(hdr);

  if(!logs.length){wrap.appendChild(emptyState("\uD83D\uDCCB","No logs yet","Log care from a plant card."));parent.appendChild(wrap);return;}

  // Group logs by plant — show latest per plant, expandable to full history
  var plantMap={};
  logs.forEach(function(l){
    if(!plantMap[l.PlantID])plantMap[l.PlantID]=[];
    plantMap[l.PlantID].push(l);
  });
  // Sort each plant's logs newest first
  Object.keys(plantMap).forEach(function(pid){
    plantMap[pid].sort(function(a,b){return new Date(b.LogDate)-new Date(a.LogDate);});
  });
  // Sort plants by most recent log
  var sortedPlantIDs=Object.keys(plantMap).sort(function(a,b){
    return new Date(plantMap[b][0].LogDate)-new Date(plantMap[a][0].LogDate);
  });

  sortedPlantIDs.forEach(function(pid){
    var pLogs=plantMap[pid];
    var p=plants.filter(function(pl){return pl.PlantID===pid;})[0];
    var latest=pLogs[0];

    // Plant section header
    var sec=el("div",{css:"margin-bottom:14px;border:1px solid rgba(0,0,0,0.06);border-radius:12px;overflow:hidden;background:rgba(250,247,242,0.7)"});

    // Latest log row (always visible)
    sec.appendChild(makeLogRow(latest,p,true));

    // If more logs exist, add collapsible history
    if(pLogs.length>1){
      var histOpen=false;
      var histWrap=el("div",{css:"display:none"});
      pLogs.slice(1).forEach(function(log){histWrap.appendChild(makeLogRow(log,p,false));});

      var toggleBtn=el("button",{css:"width:100%;padding:7px;font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--muted);background:rgba(0,0,0,0.02);border:none;border-top:1px solid rgba(0,0,0,0.05);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px"});
      var chevEl=el("span",{txt:"\u25be",css:"transition:transform .2s"});
      toggleBtn.appendChild(el("span",{txt:"Show "+(pLogs.length-1)+" older "+(pLogs.length-1===1?"entry":"entries")}));
      toggleBtn.appendChild(chevEl);
      toggleBtn.onclick=function(){
        histOpen=!histOpen;
        histWrap.style.display=histOpen?"block":"none";
        chevEl.style.transform=histOpen?"rotate(-180deg)":"";
        toggleBtn.querySelector("span").textContent=histOpen?"Hide history":"Show "+(pLogs.length-1)+" older "+(pLogs.length-1===1?"entry":"entries");
      };
      sec.appendChild(histWrap);
      sec.appendChild(toggleBtn);
    }

    wrap.appendChild(sec);
  });
  parent.appendChild(wrap);
}

function makeLogRow(log,p,isLatest){
  var row=el("div",{cls:"log-row",css:isLatest?"":"background:rgba(0,0,0,0.015)"});
  var left=el("div");
  var nameEl=el("div",{cls:"lr-nm"});
  if(isLatest&&p){
    nameEl.textContent=p.PlantName;
  } else {
    nameEl.style.cssText="font-family:'Geist Mono',monospace;font-size:9px;color:var(--muted)";
    nameEl.textContent=fmt(log.LogDate);
  }
  left.appendChild(nameEl);
  left.appendChild(el("div",{cls:"lr-dt",txt:isLatest?fmt(log.LogDate):""}));
  row.appendChild(left);
  var tags=el("div",{cls:"lr-tags"});
  if(log.Water)tags.appendChild(el("span",{cls:"chip",css:"background:var(--mist);color:var(--forest);border-color:var(--mint)",txt:"\uD83D\uDCA7 Watered"}));
  if(log.NewGrowth)tags.appendChild(el("span",{cls:"chip",css:"background:var(--mist);color:var(--forest);border-color:var(--mint)",txt:"\uD83C\uDF31 Growth"}));
  if(log.NewLeaves)tags.appendChild(el("span",{cls:"chip",css:"background:var(--mist);color:var(--forest);border-color:var(--mint)",txt:"\uD83C\uDF43 "+( log.NewLeafCount||"")+" leaves"}));
  if(log.FertiliserUsed)tags.appendChild(el("span",{cls:"chip",css:"background:var(--amber-bg);color:#7a4200;border-color:#f0d090",txt:"\uD83C\uDF3F "+log.FertiliserUsed}));
  tags.appendChild(el("span",{cls:"chip chip-stage",txt:log.PlantStage}));
  var hsBg=log.HealthStatus==="Healthy"?"background:var(--mist);color:var(--forest);border-color:var(--mint)":log.HealthStatus==="Concerning"?"background:var(--amber-bg);color:#7a4200;border-color:#f0d090":"background:var(--red-bg);color:#8a2020;border-color:#f0b8b8";
  tags.appendChild(el("span",{cls:"chip",css:hsBg,txt:log.HealthStatus}));
  row.appendChild(tags);
  var sc=el("div",{cls:"lr-sc"});
  if(log.NextWateringDate)sc.appendChild(el("div",{txt:"\uD83D\uDCA7 "+fmtS(log.NextWateringDate)}));
  if(log.NextFertDate)sc.appendChild(el("div",{txt:"\uD83C\uDF3F "+fmtS(log.NextFertDate)}));
  if(log.Notes)sc.appendChild(el("div",{css:"font-style:italic",txt:log.Notes.substring(0,40)+(log.Notes.length>40?"...":"")}));
  row.appendChild(sc);
  var acts=el("div",{cls:"lr-acts"});
  acts.appendChild(el("button",{cls:"lr-edit",txt:"EDIT",onclick:function(){
    modal="editLog";selLog=log;selPlant=p||null;
    fd={HealthStatus:log.HealthStatus,PlantStage:log.PlantStage,
        FertiliserUsed:log.FertiliserUsed||"",NextFertDate:log.NextFertDate||"",
        Water:!!log.Water,NewGrowth:!!log.NewGrowth,NewLeaves:!!log.NewLeaves,
        NewLeafCount:log.NewLeafCount||1,Fertilised:!!(log.FertiliserUsed||log.NextFertDate),
        NextWateringDate:log.NextWateringDate||"",Notes:log.Notes||"",
        PotType:log.PotType||null,PotSize:log.PotSize||null,
        WeeklyNote:log.WeeklyNote||"",DamageTypes:log.DamageTypes||[]};
    render();
  }}));
  acts.appendChild(el("button",{cls:"lr-del",txt:"\u2715",onclick:function(){
    if(!confirm("Delete this log entry?"))return;
    logs=logs.filter(function(l){return l.LogID!==log.LogID;});
    save("lpb5_logs",logs);
    if(log)dbDeleteLog(log.LogID);
    render();
  }}));
  row.appendChild(acts);
  return row;
}

var FACTS=[
  {ico:"\uD83C\uDF3F",tag:"MONSTERA FACT",txt:"Monstera deliciosa fenestrations evolved to let light filter to lower leaves in dense rainforests and to resist hurricane-force winds in their native Mexico and Central America.",src:"Tropical Botany Review"},
  {ico:"\uD83C\uDF3F",tag:"MONSTERA FACT",txt:"In the wild, mature Monsteras climb 20 metres or more up host trees using thick aerial roots that anchor them and absorb atmospheric moisture.",src:"Araceae Field Studies"},
  {ico:"\uD83C\uDF3F",tag:"MONSTERA CARE",txt:"Monstera leaves only fenestrate when mature and in sufficient light. A Monstera in low light may produce exclusively solid, juvenile-shaped leaves indefinitely.",src:"Indoor Horticulture Research"},
  {ico:"\uD83C\uDF3F",tag:"MONSTERA FACT",txt:"Monstera deliciosa produces an edible fruit taking over a year to ripen. It tastes like pineapple and banana \u2014 but unripe fruit contains calcium oxalate crystals that burn the mouth.",src:"Edible Tropical Plants"},
  {ico:"\uD83C\uDF3F",tag:"MONSTERA CARE",txt:"Aerial roots on Monsteras should never be cut off. Trained into moss poles, they dramatically accelerate growth and allow the plant to support larger, more fenestrated leaves.",src:"Aroid Culture Handbook"},
  {ico:"\uD83D\uDC0A",tag:"ALOCASIA FACT",txt:"Alocasias hold their leaves upward; Colocasias let theirs droop. Despite both being called \u2018elephant ears\u2019, they are distinct genera with different care requirements.",src:"Araceae Taxonomy"},
  {ico:"\uD83D\uDC0A",tag:"ALOCASIA CARE",txt:"Alocasias enter dormancy in winter, dropping all leaves. This is not death \u2014 the corm survives underground. Keep soil barely moist and wait. New growth emerges in spring.",src:"Aroid Dormancy Research"},
  {ico:"\uD83D\uDC0A",tag:"ALOCASIA FACT",txt:"Alocasia \u2018Black Velvet\u2019 (reginula) is native to the rainforest floors of Borneo. Its velvety dark leaves with silver veins evolved to capture maximum light in deep shade.",src:"Borneo Botanical Survey"},
  {ico:"\uD83D\uDC0A",tag:"ALOCASIA CARE",txt:"Bottom watering \u2014 placing the pot in a tray of water for 20 minutes \u2014 lets roots drink deeply while keeping the surface drier, significantly reducing fungal rot risk.",src:"Indoor Plant Irrigation Science"},
  {ico:"\uD83D\uDC0A",tag:"ALOCASIA FACT",txt:"Guttation (water droplets on leaf tips at night) in Alocasias is completely normal. The plant releases excess moisture through hydathodes \u2014 a sign of healthy root pressure.",src:"Plant Physiology Basics"},
  {ico:"\uD83D\uDC0A",tag:"ALOCASIA CARE",txt:"Alocasias are sensitive to fluoride and chlorine in tap water. Brown leaf tips often indicate chemical build-up. Switching to filtered or rain water can reverse this within months.",src:"Water Quality & Plants"},
  {ico:"\uD83D\uDC9A",tag:"PHILODENDRON FACT",txt:"Philodendron means \u2018tree lover\u2019 in Greek. Most species are hemi-epiphytes \u2014 they begin life on the forest floor and climb toward the canopy over many years.",src:"Etymology & Botany"},
  {ico:"\uD83D\uDC9A",tag:"PHILODENDRON FACT",txt:"Philodendron gloriosum is a terrestrial crawler, not a climber. Unlike most philodendrons, it spreads horizontally along the forest floor in Colombia, one stunning velvety leaf at a time.",src:"Colombian Flora Studies"},
  {ico:"\uD83D\uDC9A",tag:"PHILODENDRON CARE",txt:"Heartleaf Philodendron (P. hederaceum) is one of the best air-purifying plants studied by NASA \u2014 capable of removing formaldehyde, benzene, and xylene from indoor environments.",src:"NASA Clean Air Study"},
  {ico:"\uD83D\uDC9A",tag:"PHILODENDRON FACT",txt:"The Pink Princess Philodendron\u2019s variegation is caused by a chimeric mutation \u2014 two genetically distinct cell lines growing together. Cuttings don\u2019t always produce the same pink coloration.",src:"Plant Genetics Research"},
  {ico:"\uD83D\uDC9A",tag:"PHILODENDRON CARE",txt:"New philodendron leaves emerge enclosed in a cataphyll \u2014 a protective sheath. As the leaf unfurls, the cataphyll dries and falls. This is completely normal, not disease.",src:"Aroid Growth Patterns"},
  {ico:"\uD83C\uDF40",tag:"SYNGONIUM FACT",txt:"Syngoniums change leaf shape dramatically with age \u2014 young plants produce arrowhead leaves while mature specimens develop deeply lobed, multi-fingered foliage that looks like a different species.",src:"Araceae Morphology"},
  {ico:"\uD83C\uDF40",tag:"SYNGONIUM CARE",txt:"Syngonium podophyllum has been found to reduce particulate matter in indoor air by up to 67%. Its broad surface area and waxy coating trap fine dust particles effectively.",src:"Indoor Air Quality Studies"},
  {ico:"\uD83C\uDF40",tag:"SYNGONIUM FACT",txt:"Pink Syngoniums revert to green in low light. The pink pigment (anthocyanin) requires strong indirect light. Moving the plant closer to a bright window usually restores colour within weeks.",src:"Photopigment Research"},
  {ico:"\uD83C\uDF40",tag:"SYNGONIUM CARE",txt:"A single Syngonium node cutting can root and produce three new leaves within six weeks when given warmth, humidity, and bright indirect light.",src:"Propagation & Growth Studies"},
  {ico:"\uD83C\uDF51",tag:"AGLAONEMA FACT",txt:"Aglaonemas have been cultivated in Asian households for centuries, believed to bring good luck. They tolerate genuinely low light \u2014 even fluorescent office lighting.",src:"Cultural Plant History"},
  {ico:"\uD83C\uDF51",tag:"AGLAONEMA CARE",txt:"The redder an Aglaonema, the more light it needs. Deep red and pink varieties need bright indirect light. Green varieties are the true low-light champions of the genus.",src:"Aglaonema Cultivation Guide"},
  {ico:"\uD83C\uDF51",tag:"AGLAONEMA FACT",txt:"Aglaonemas actively remove benzene and formaldehyde from indoor air \u2014 common chemicals released by furniture, carpets, and cleaning products.",src:"Indoor Toxicology Research"},
  {ico:"\uD83C\uDF51",tag:"AGLAONEMA CARE",txt:"Aglaonemas prefer being slightly root-bound. Repot only when roots visibly emerge from drainage holes, and choose a pot just one size larger to avoid overwatering risk.",src:"Container Plant Science"},
  {ico:"\uD83E\uDD9A",tag:"BIRD NEST FERN FACT",txt:"Bird Nest Ferns (Asplenium nidus) grow in the crooks of tree branches in the wild, collecting leaf litter to build their own nutrient-rich compost around their roots.",src:"Epiphyte Ecology"},
  {ico:"\uD83E\uDD9A",tag:"BIRD NEST FERN CARE",txt:"Never water directly into the centre rosette of a Bird Nest Fern. Water collecting in the crown causes rot. Always water at soil level.",src:"Fern Care Handbook"},
  {ico:"\uD83E\uDD9A",tag:"BIRD NEST FERN FACT",txt:"The \u2018Crispy Wave\u2019 Bird Nest Fern has been shown in Japanese studies to be one of the most effective plants at removing formaldehyde from enclosed spaces.",src:"Japanese Plant Research Institute"},
  {ico:"\uD83E\uDD9A",tag:"BIRD NEST FERN CARE",txt:"Bird Nest Ferns are sensitive to cold draughts and air conditioning. Their ideal range is 18\u201327\u00b0C. Leaf browning almost always indicates low humidity or cold air exposure.",src:"Tropical Fern Culture"},
  {ico:"\uD83E\uDD9A",tag:"BIRD NEST FERN FACT",txt:"Fern fronds unfurl from a central spiral called a crozier or fiddlehead. Touching unfurling fronds can cause permanent deformity \u2014 leave them completely undisturbed.",src:"Pteridology"},
  {ico:"\uD83E\uDDF4",tag:"SOIL SCIENCE",txt:"LECA wicks moisture by capillary action while maintaining 50\u201370% air space around roots, mimicking the loose, oxygen-rich conditions of epiphytic roots in the wild.",src:"Hydroponics Research"},
  {ico:"\uD83D\uDCA7",tag:"WATERING SCIENCE",txt:"Overwatering is the leading cause of houseplant death. The damage isn\u2019t from water itself \u2014 waterlogged soil creates anaerobic conditions where root rot pathogens thrive.",src:"Plant Pathology Basics"},
  {ico:"\uD83C\uDF1F",tag:"LIGHT SCIENCE",txt:"Direct summer sun through glass can reach 100,000 lux. A sheer curtain reduces intensity by 50% without filtering spectrum \u2014 ideal for bright-indirect-loving aroids.",src:"Horticultural Lighting Research"},
  {ico:"\uD83C\uDF2B",tag:"HUMIDITY SCIENCE",txt:"Grouping plants creates a microclimate of 5\u201310% higher relative humidity as transpired water vapour accumulates between leaves \u2014 no humidifier required.",src:"Microclimate Horticulture"},
  {ico:"\uD83E\uDD66",tag:"NUTRITION FACT",txt:"Nitrogen drives leaf growth; Phosphorus supports root and flower development; Potassium regulates water balance and disease resistance. Balance all three for thriving plants.",src:"Plant Biochemistry"},
  {ico:"\uD83E\uDED7",tag:"AERIAL ROOT FACT",txt:"Monstera and Philodendron aerial roots contain velamen \u2014 a spongy tissue that absorbs moisture and nutrients directly from humid air, bypassing soil entirely.",src:"Root Anatomy Research"},
  {ico:"\uD83C\uDF35",tag:"SUCCULENT SCIENCE",txt:"Succulents use Crassulacean Acid Metabolism (CAM) \u2014 they open stomata only at night to absorb CO\u2082, dramatically reducing water loss compared to day-photosynthesising plants.",src:"CAM Plant Biology"},
  {ico:"\uD83D\uDD2C",tag:"PROPAGATION SCIENCE",txt:"Water roots have a different cellular structure than soil roots. Transitioning cuttings from water to soil too quickly causes transplant shock as the plant regrows soil-adapted roots.",src:"Propagation Biology"},
  {ico:"\uD83C\uDF3C",tag:"FLOWERING FACT",txt:"The Peace Lily\u2019s white \u2018flower\u2019 is actually a spathe \u2014 a modified leaf to attract pollinators to the true flowers on the central spadix. Almost all aroids reproduce this way.",src:"Araceae Reproductive Biology"},
  {ico:"\uD83C\uDF31",tag:"GROWTH SCIENCE",txt:"Plants grow toward light through phototropism \u2014 shaded-side cells elongate faster, bending the stem toward the source. Rotating your plant 180\u00b0 weekly promotes even, balanced growth.",src:"Plant Tropism Research"},
  {ico:"\uD83E\uDD0E",tag:"PEST SCIENCE",txt:"Spider mites thrive in hot, dry conditions. Increasing humidity above 60% significantly inhibits their reproduction. The stippled bronze leaf discolouration they cause is called \u2018bronzing\u2019.",src:"Integrated Pest Management"},
  {ico:"\uD83E\uDEB2",tag:"FUNGUS GNATS",txt:"Fungus gnat larvae feed on root hairs in moist topsoil. Allowing the top 3\u20135cm to dry completely between waterings breaks their lifecycle and eliminates most infestations.",src:"Soil Entomology"},
  {ico:"\uD83C\uDF42",tag:"AUTUMN CARE",txt:"Autumn is the ideal time to flush accumulated fertiliser salts by watering heavily until water flows freely from drainage holes, resetting soil chemistry before winter.",src:"Seasonal Plant Care"},
  {ico:"\uD83C\uDF1E",tag:"VARIEGATION FACT",txt:"Chimeric variegation (like in Thai Constellation Monstera) is caused by two genetically distinct cell lines growing together. It is stable and heritable through stem cuttings.",src:"Plant Genetics & Variegation"},
  {ico:"\uD83D\uDCA8",tag:"TRANSPIRATION FACT",txt:"A large Monstera can transpire over 1 litre of water per day. This moisture release humidifies the surrounding air and cools the plant\u2019s surface \u2014 the same mechanism as human sweating.",src:"Plant Physiology Journal"},
  {ico:"\uD83C\uDF33",tag:"EPIPHYTE FACT",txt:"Epiphytes don\u2019t steal nutrients from their host tree \u2014 they simply use them for structural support. Their nutrients come from rain, decomposing leaf litter, and atmospheric particles.",src:"Epiphyte Biology"}
];
function renderReminders(parent){
  var nw2=plants.filter(needsWater);var nf=plants.filter(needsFert);
  var uw=plants.filter(function(p){var d=daysUntil(nextWD(p.PlantID));return !p.dead&&d!==null&&d>0&&d<=7;}).sort(function(a,b){return daysUntil(nextWD(a.PlantID))-daysUntil(nextWD(b.PlantID));});
  var uf=plants.filter(function(p){var d=daysUntil(nextFD(p.PlantID));return !p.dead&&d!==null&&d>0&&d<=14;}).sort(function(a,b){return daysUntil(nextFD(a.PlantID))-daysUntil(nextFD(b.PlantID));});
  var layout=el("div",{cls:"rem-layout"});
  var lCol=el("div",{cls:"rem-left"});
  function remSec(title,items,type){
    if(!items.length)return;
    lCol.appendChild(el("div",{cls:"rem-sec-t",txt:title}));
    items.forEach(function(p){lCol.appendChild(makeRemCard(p,type));});
  }
  if(!nw2.length&&!nf.length&&!uw.length&&!uf.length){
    lCol.appendChild(emptyState("\u2705","All plants are happy","No care due right now."));
  } else {
    remSec("\uD83D\uDCA7 Watering \u2014 due now",nw2,"water");
    remSec("\uD83D\uDCA7 Watering \u2014 next 7 days",uw,"water-up");
    remSec("\uD83C\uDF3F Fertilising \u2014 due now",nf,"fert");
    remSec("\uD83C\uDF3F Fertilising \u2014 next 14 days",uf,"fert-up");
  }
  layout.appendChild(lCol);
  var rCol=el("div",{cls:"rem-right"});
  // Plant of the day
  var alive=plants.filter(function(p){return !p.dead;});
  if(alive.length){
    var di=new Date();
    var potd=alive[(di.getFullYear()*366+di.getMonth()*31+di.getDate())%alive.length];
    var pc=el("div",{cls:"potd-card"});
