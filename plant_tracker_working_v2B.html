    pc.appendChild(pimg);
    var pb=el("div",{cls:"potd-body"});
    pb.appendChild(el("div",{cls:"potd-label",txt:"PLANT OF THE DAY"}));
    pb.appendChild(el("div",{cls:"potd-name",txt:potd.PlantName}));
    pb.appendChild(el("div",{cls:"potd-sci",txt:potd.Genus+" "+potd.Species}));
    var ll=lastLog(potd.PlantID);
    if(ll){var pn=el("div",{cls:"potd-note"});pn.innerHTML="\uD83C\uDF31 Last seen: <strong>"+ll.HealthStatus+"</strong> \u00b7 "+ll.PlantStage+" stage";pb.appendChild(pn);}
    pc.appendChild(pb);rCol.appendChild(pc);
  }
  // Daily fact card
  var di2=new Date();
  var fi=(di2.getFullYear()*366+di2.getMonth()*31+di2.getDate()+3)%FACTS.length;
  var fact=FACTS[fi];
  var fc=el("div",{cls:"fact-card"});
  fc.appendChild(el("div",{cls:"fact-card-tag",txt:fact.tag}));
  fc.appendChild(el("span",{cls:"fact-card-ico",txt:fact.ico}));
  fc.appendChild(el("div",{cls:"fact-card-txt",txt:fact.txt}));
  fc.appendChild(el("div",{cls:"fact-card-src",txt:fact.src.toUpperCase()}));
  rCol.appendChild(fc);
  // Collection at a glance
  var wateredWeek=logs.filter(function(l){return l.Water&&(Date.now()-new Date(l.LogDate))<7*86400000;}).length;
  var healthyCount=alive.filter(function(p){var ll2=lastLog(p.PlantID);return ll2&&ll2.HealthStatus==="Healthy";}).length;
  var cs=el("div",{cls:"care-stats-card"});
  cs.appendChild(el("div",{cls:"cscard-title",txt:"YOUR COLLECTION AT A GLANCE"}));
  function csrow(ico,lbl,val){var r=el("div",{cls:"cscard-row"});var lb=el("div",{cls:"cscard-lbl"});lb.appendChild(el("span",{txt:ico}));lb.appendChild(el("span",{txt:lbl}));r.appendChild(lb);r.appendChild(el("div",{cls:"cscard-val",txt:val}));return r;}
  cs.appendChild(csrow("\uD83E\uDEF4","Total plants",alive.length+" alive"));
  cs.appendChild(csrow("\uD83D\uDCCB","Total care logs",logs.length+" entries"));
  cs.appendChild(csrow("\uD83D\uDCA7","Watered this week",wateredWeek+" times"));
  cs.appendChild(csrow("\u2705","Currently healthy",healthyCount+"/"+alive.length+" plants"));
  cs.appendChild(csrow("\uD83D\uDD14","Need attention now",(nw2.length+nf.length)+" plants"));
  rCol.appendChild(cs);
  // Seasonal tip (Southern Hemisphere)
  var month=new Date().getMonth();
  var SEASONS=[
    {ico:"\uD83C\uDF31",title:"SPRING CARE (SEP\u2013NOV)",txt:"Time to repot! Spring is when roots wake up and push against containers. Check for root-bound plants and step up one pot size with fresh aroid mix."},
    {ico:"\uD83C\uDF1E",title:"SUMMER CARE (DEC\u2013FEB)",txt:"Increase watering as temperatures rise. Watch for spider mites in dry heat \u2014 mist foliage and check leaf undersides weekly. Feed every 3\u20134 weeks."},
    {ico:"\uD83C\uDF42",title:"AUTUMN CARE (MAR\u2013MAY)",txt:"Begin tapering fertiliser as growth slows. Avoid repotting now. Bring outdoor plants inside before nights drop below 12\u00b0C."},
    {ico:"\u2744\uFE0F",title:"WINTER CARE (JUN\u2013AUG)",txt:"Reduce watering significantly \u2014 most tropical plants enter slow dormancy. Keep away from cold windows and draughts. No fertiliser until new growth appears in spring."}
  ];
  var seasonIdx=month>=8&&month<=10?0:month>=11||month<=1?1:month>=2&&month<=4?2:3;
  var sea=SEASONS[seasonIdx];
  var sc2=el("div",{cls:"season-card"});
  var sh=el("div",{cls:"season-hdr"});sh.appendChild(el("span",{cls:"season-ico",txt:sea.ico}));sh.appendChild(el("div",{cls:"season-title",txt:sea.title}));
  sc2.appendChild(sh);sc2.appendChild(el("div",{cls:"season-txt",txt:sea.txt}));
  rCol.appendChild(sc2);
  layout.appendChild(rCol);
  parent.appendChild(layout);
}
function makeRemCard(p,type){

  var date=isW?nextWD(p.PlantID):nextFD(p.PlantID);
  var days=daysUntil(date);var ov=days!==null&&days<0;
  var card=el("div",{cls:"rem-card "+(ov?"rov":isW?"rw":"rf")});
  var av=el("div",{cls:"rem-av"});
  if(p.photo){var img=el("img");img.src=p.photo;av.appendChild(img);}else av.appendChild(el("span",{txt:plantEmoji(p),css:"font-size:16px"}));
  card.appendChild(av);
  var info=el("div",{css:"flex:1"});info.appendChild(el("div",{cls:"rem-name",txt:p.PlantName}));
  var it=days===null?"No schedule":days<0?(isW?"Watering":"Fertilising")+" overdue "+Math.abs(days)+"d":days===0?(isW?"Water":"Fertilise")+" today \u2014 "+fmtS(date):"In "+days+"d \u2014 "+fmtS(date);
  info.appendChild(el("div",{cls:"rem-info "+(ov?"ri-ov":isW?"ri-w":"ri-f"),txt:it}));

function renderWeather(parent){
  var DAYS=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  var wrap=el("div",{cls:"wx-page"});

  if(!wxData){
    var ld=el("div",{cls:"wx-loading"});
    ld.appendChild(el("div",{cls:"wx-loading-ico",txt:"\u26c5"}));

  // Location

  // Temp + desc
  var tb=el("div",{cls:"wx-temp-block"});
  tb.appendChild(el("div",{cls:"wx-big-temp",txt:wxData.temp+"\u00b0"}));
  tb.appendChild(el("div",{cls:"wx-big-desc",txt:wxData.desc}));
  tb.appendChild(el("div",{cls:"wx-big-feels",txt:"CAPE TOWN \u2022 WESTERN CAPE"}));
  hero.appendChild(tb);

  // Weather icon
  hero.appendChild(el("div",{cls:"wx-hero-ico",txt:wxData.ico}));

  // Stats strip
  var ss=el("div",{cls:"wx-stats-strip"});
  function sc(ico,val,lbl){
    var cell=el("div",{cls:"wx-stat-cell"});
    cell.appendChild(el("div",{cls:"wx-sc-ico",txt:ico}));
    cell.appendChild(el("div",{cls:"wx-sc-val",txt:val}));
    cell.appendChild(el("div",{cls:"wx-sc-lbl",txt:lbl}));
    return cell;
  }
  ss.appendChild(sc("\uD83D\uDCA7",(wxData.humidity||"--")+"%","Humidity"));
  ss.appendChild(sc("\uD83D\uDCA8",(wxData.wind||"--")+" km/h","Wind speed"));
  ss.appendChild(sc("\uD83C\uDF27",(wxData.precip||"0")+" mm","Precipitation"));
  var now=new Date();
  ss.appendChild(sc("\uD83D\uDD52",now.toLocaleTimeString("en-ZA",{hour:"2-digit",minute:"2-digit"}),"Local time"));
  hero.appendChild(ss);
  wrap.appendChild(hero);

  if(!wxForecast){parent.appendChild(wrap);return;}

  // ── 7-DAY FORECAST ────────────────────────────────────────────────────
  var allHi=wxForecast.temperature_2m_max;
  var allLo=wxForecast.temperature_2m_min;
  var tAbsMin=Math.min.apply(null,allLo);
  var tAbsMax=Math.max.apply(null,allHi);
  var tAbsRange=tAbsMax-tAbsMin||1;

  var strip=el("div",{cls:"wx-forecast-strip"});
  for(var i=0;i<7;i++){
    var d=new Date(wxForecast.time[i]);
    var dn=i===0?"TODAY":DAYS[d.getDay()].toUpperCase();
    var inf=wxCode(wxForecast.weather_code[i],1);
    var hi=Math.round(allHi[i]);var lo=Math.round(allLo[i]);
    var pr=wxForecast.precipitation_sum[i];
    var ws2=Math.round(wxForecast.wind_speed_10m_max[i]);
    var hm=wxForecast.relative_humidity_2m_max[i];

    var card=el("div",{cls:"wx-fc"+(i===0?" wx-fc-today":""),css:"animation-delay:"+(i*0.06)+"s"});
    card.appendChild(el("div",{cls:"wx-fc-day",txt:dn}));
    card.appendChild(el("span",{cls:"wx-fc-ico",txt:inf[0]}));
    card.appendChild(el("div",{cls:"wx-fc-hi",txt:hi+"\u00b0"}));
    card.appendChild(el("div",{cls:"wx-fc-lo",txt:lo+"\u00b0"}));

    // temperature range mini bar
    var bar=el("div",{cls:"wx-fc-bar"});
    var loPct=Math.round((lo-tAbsMin)/tAbsRange*100);
    var hiPct=Math.round((hi-tAbsMin)/tAbsRange*100);
    var fill=el("div",{cls:"wx-fc-bar-fill",css:"left:"+loPct+"%;width:"+Math.max(hiPct-loPct,8)+"%"});
    bar.appendChild(fill);card.appendChild(bar);

    var tags=el("div",{cls:"wx-fc-tags"});
    if(pr>0)tags.appendChild(el("div",{cls:"wx-fc-tag",txt:pr.toFixed(1)+"mm rain"}));
    tags.appendChild(el("div",{cls:"wx-fc-tag",txt:ws2+"km/h wind"}));
    tags.appendChild(el("div",{cls:"wx-fc-tag",txt:hm+"% humidity"}));
    card.appendChild(tags);
    strip.appendChild(card);
  }
  wrap.appendChild(strip);

  // ── DETAIL CHARTS with Chart.js ─────────────────────────────────────────
  var cgrid=el("div",{cls:"wx-chart-grid"});

  function dayLbl(i){
    var d2=new Date(wxForecast.time[i]);
    return i===0?"Today":DAYS[d2.getDay()];
  }
  var labels=[];
  for(var i=0;i<7;i++)labels.push(dayLbl(i));

  var allHi2=wxForecast.temperature_2m_max.map(function(v){return Math.round(v);});
  var allLo2=wxForecast.temperature_2m_min.map(function(v){return Math.round(v);});
  var precipData=wxForecast.precipitation_sum.map(function(v){return parseFloat(v.toFixed(1));});
  var windData=wxForecast.wind_speed_10m_max.map(function(v){return Math.round(v);});
  var humData=wxForecast.relative_humidity_2m_max;

  function wxPanel(title,unit,canvasId,heightPx){
    var p=el("div",{cls:"wx-chart-panel"});
    var hdr=el("div",{cls:"wx-chart-hdr"});
    hdr.appendChild(el("div",{cls:"wx-chart-title",txt:title}));
    hdr.appendChild(el("div",{cls:"wx-chart-unit",txt:unit}));
    p.appendChild(hdr);
    var wrap=el("div",{cls:"wx-chart-wrap",css:"height:"+heightPx+"px"});
    wrap.appendChild(el("canvas",{id:canvasId}));
    p.appendChild(wrap);
    return p;
  }

  // Panel 1: Temperature range — line chart with hi/lo band
  cgrid.appendChild(wxPanel("TEMPERATURE RANGE","(\u00b0C)","cv-wx-temp",180));

  // Panel 2: Precipitation — bar chart
  cgrid.appendChild(wxPanel("PRECIPITATION","(mm)","cv-wx-precip",180));

  // Panel 3: Wind speed — bar chart (horizontal feel via vertical bars with color scale)
  cgrid.appendChild(wxPanel("WIND SPEED","(km/h)","cv-wx-wind",180));

  // Panel 4: Humidity — area line chart
  cgrid.appendChild(wxPanel("HUMIDITY","(%)","cv-wx-hum",180));

  wrap.appendChild(cgrid);
  parent.appendChild(wrap);

  // Draw charts after DOM ready
  setTimeout(function(){
    if(typeof Chart==="undefined")return;
    var F="Geist Mono";
    var noGrid={display:false};
    var axisTick={font:{family:F,size:11,weight:"600"},color:"rgba(0,0,0,0.75)"};
    // Clean shared base — NO grid lines anywhere, minimal axes
    var base={
      responsive:true,
      maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:"rgba(10,10,8,0.85)",
          titleFont:{family:F,size:10},
          bodyFont:{family:F,size:10},
          padding:10,cornerRadius:8,
          borderColor:"rgba(255,255,255,0.08)",
          borderWidth:1
        }
      },
      scales:{
        x:{
          grid:noGrid,
          border:{display:false},
          ticks:axisTick
        },
        y:{
          grid:noGrid,
          border:{display:false},
          ticks:axisTick
        }
      }
    };

    function deepMerge(a,b){
      var r=Object.assign({},a);
      Object.keys(b).forEach(function(k){
        if(b[k]&&typeof b[k]==="object"&&!Array.isArray(b[k])&&a[k]&&typeof a[k]==="object"){
          r[k]=deepMerge(a[k],b[k]);
        } else { r[k]=b[k]; }
      });
      return r;
    }

    // 1. TEMPERATURE — dual line, fill between, NO grid
    var tc=document.getElementById("cv-wx-temp");
    if(tc)new Chart(tc,{
      type:"line",
      data:{
        labels:labels,
        datasets:[
          {label:"High",data:allHi2,borderColor:"#c07808",backgroundColor:"rgba(192,120,8,0.07)",
           borderWidth:2.5,pointRadius:5,pointBackgroundColor:"#fff",pointBorderColor:"#c07808",
           pointBorderWidth:2,tension:0.4,fill:"+1"},
          {label:"Low",data:allLo2,borderColor:"#2e9e72",backgroundColor:"transparent",
           borderWidth:2.5,pointRadius:5,pointBackgroundColor:"#fff",pointBorderColor:"#2e9e72",
           pointBorderWidth:2,tension:0.4,fill:false}
        ]
      },
      options:deepMerge(base,{
        plugins:{legend:{display:true,position:"top",
          labels:{font:{family:F,size:11},boxWidth:10,padding:16,color:"#555550",usePointStyle:true,pointStyle:"circle"}}},
        scales:{
          y:{ticks:{callback:function(v){return v;},stepSize:2}}
        }
      })
    });

    // 2. PRECIPITATION — bar chart, minimal
    var pc2=document.getElementById("cv-wx-precip");
    if(pc2){
      var pColors=precipData.map(function(v){
        return v>10?"rgba(24,95,165,0.8)":v>3?"rgba(46,158,114,0.75)":v>0?"rgba(125,216,176,0.65)":"rgba(200,200,195,0.4)";
      });
      new Chart(pc2,{
        type:"bar",
        data:{labels:labels,datasets:[{
          data:precipData,backgroundColor:pColors,
          borderRadius:8,borderSkipped:false,
          borderWidth:0
        }]},
        options:deepMerge(base,{
          scales:{y:{ticks:{callback:function(v){return v;}}}}
        })
      });
    }

    // 3. WIND — polar area chart (each day = one segment, size = speed)
    var wc2=document.getElementById("cv-wx-wind");
    if(wc2){
      var wBgColors=windData.map(function(v){
        return v>40?"rgba(184,48,48,0.75)":v>25?"rgba(192,120,8,0.70)":"rgba(46,158,114,0.65)";
      });
      var wBorderColors=windData.map(function(v){
        return v>40?"#b83030":v>25?"#c07808":"#2e9e72";
      });
      new Chart(wc2,{
        type:"polarArea",
        data:{
          labels:labels,
          datasets:[{
            data:windData,
            backgroundColor:wBgColors,
            borderColor:wBorderColors,
            borderWidth:1.5
          }]
        },
        options:{
          responsive:true,
          maintainAspectRatio:false,
          plugins:{
            legend:{
              display:true,
              position:"right",
              labels:{
                font:{family:F,size:11,weight:"600"},
                color:"rgba(0,0,0,0.7)",
                generateLabels:function(chart){
                  return chart.data.labels.map(function(lbl,i){
                    var v=windData[i];
                    var desc=v>40?"strong":v>25?"moderate":"calm";
                    return{
                      text:lbl+" — "+v+" ("+desc+")",
                      fillStyle:wBgColors[i],
                      strokeStyle:wBorderColors[i],
                      lineWidth:1.5,
                      index:i
                    };
                  });
                }
              }
            },
            tooltip:{
              backgroundColor:"rgba(10,10,8,0.85)",
              titleFont:{family:F,size:11,weight:"600"},
              bodyFont:{family:F,size:11},
              padding:10,cornerRadius:8,
              callbacks:{
                label:function(ctx){
                  var v=ctx.raw;
                  var desc=v>40?"Strong wind":v>25?"Moderate breeze":v>10?"Light breeze":"Calm";
                  return " "+v+" km/h — "+desc;
                }
              }
            }
          },
          scales:{
            r:{
              ticks:{
                font:{family:F,size:11,weight:"600"},
                color:"rgba(0,0,0,0.6)",
                backdropColor:"transparent",
                callback:function(v){return v;}
              },
              grid:{color:"rgba(0,0,0,0.06)"},
              pointLabels:{display:false}
            }
          }
        }
      });
    }

    // 4. HUMIDITY — smooth area, no grid
    var hc2=document.getElementById("cv-wx-hum");
    if(hc2){
      var ctx2=hc2.getContext("2d");

          tension:0.4,fill:true
        }]},
        options:deepMerge(base,{
          scales:{y:{min:0,max:100,ticks:{callback:function(v){return v;},stepSize:20}}}
        })
      });
    }

  },100);
}

var wxData=null;
function wxCode(code,isDay){
  var d=isDay!==0;
  var m={
    0:[d?"\u2600\ufe0f":"\uD83C\uDF19","Clear sky"],
    1:[d?"\uD83C\uDF24\ufe0f":"\uD83C\uDF19","Mostly clear"],
    2:["\u26c5","Partly cloudy"],
    3:["\u2601\ufe0f","Overcast"],
    45:["\uD83C\uDF2B\ufe0f","Foggy"],
    51:["\uD83C\uDF27\ufe0f","Light drizzle"],
    61:["\uD83C\uDF27\ufe0f","Light rain"],
    63:["\uD83C\uDF27\ufe0f","Rain"],
    65:["\u26c8\ufe0f","Heavy rain"],
    80:["\uD83C\uDF26\ufe0f","Showers"],
    95:["\u26c8\ufe0f","Thunderstorm"]
  };
  return m[code]||["\uD83C\uDF21\ufe0f","Unknown"];
}

function fetchWeather(){
  var lat=-33.9249,lon=18.4241,city="Cape Town";
  var url="https://api.open-meteo.com/v1/forecast?latitude="+lat+"&longitude="+lon
    +"&current=temperature_2m,weather_code,is_day,relative_humidity_2m,wind_speed_10m,precipitation"
    +"&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum,wind_speed_10m_max,relative_humidity_2m_max"
    +"&temperature_unit=celsius&wind_speed_unit=kmh&timezone=Africa/Johannesburg";
  fetch(url)
    .then(function(r){return r.json();})
    .then(function(d){
      var cur=d.current;
      var info=wxCode(cur.weather_code,cur.is_day);
      wxData={temp:Math.round(cur.temperature_2m),ico:info[0],desc:info[1],city:city,
              humidity:cur.relative_humidity_2m,wind:Math.round(cur.wind_speed_10m),precip:cur.precipitation};
      wxForecast=d.daily;
      updateWxEl();
      buildWeatherAlerts();
      if(view==="weather"){var pg=document.getElementById("page");pg.innerHTML="";renderWeather(pg);}
    })
    .catch(function(){
      var el2=document.getElementById("wlc-wx");
      if(el2)el2.innerHTML='<span style="font-family:Geist Mono,monospace;font-size:9px;color:var(--muted)">Cape Town</span>';
    });
}

    var svgIdx=Math.floor(Math.random()*leafSVGs.length);
    var colorIdx=Math.floor(Math.random()*colors.length);
    var opacity=(0.04+Math.random()*0.07).toFixed(3);
    var color=colors[colorIdx].replace("VAL","1");
    var size=(30+Math.random()*80).toFixed(0);
    var left=(Math.random()*110-5).toFixed(1);
    var duration=(25+Math.random()*40).toFixed(1);
    var delay=(-Math.random()*duration).toFixed(1);
    var rot=((Math.random()-0.5)*360).toFixed(0);
    var scale=(0.7+Math.random()*0.6).toFixed(2);
    div.style.cssText="left:"+left+"%;bottom:-150px;width:"+size+"px;height:"+size+"px;color:"+color+";--leaf-opacity:"+opacity+";--leaf-rot:"+rot+"deg;--leaf-scale:"+scale+";animation-duration:"+duration+"s;animation-delay:"+delay+"s;";
    div.innerHTML=leafSVGs[svgIdx];
    canvas.appendChild(div);
  }
})();
document.body.classList.toggle("is-mobile",isMobile());
checkAuth();
</script>
</body>
